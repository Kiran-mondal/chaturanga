<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaturanga - Ancient Indian Heritage Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: #2a1808;
            background-image: 
                linear-gradient(rgba(18, 9, 3, 0.45), rgba(8, 2, 0, 0.65)),
                url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            animation: ambientGlow 25s ease-in-out infinite;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* রাজকীয় ডাবল-লেয়ার ফ্রেম এবং নিখুঁত থ্রিডি শ্যাডো */
        .ashtapada-board {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            padding: 6px;
            background: linear-gradient(135deg, #231107 0%, #0f0703 100%);
            border: 4px solid #d4af37; 
            box-shadow: 
                0 0 0 2px #231107,
                0 20px 50px rgba(0, 0, 0, 0.95),
                0 0 35px rgba(212, 175, 55, 0.25);
            border-radius: 12px;
        }

        /* স্কয়ার ইন্টারঅ্যাকশন নিশ্চিত করার জন্য কার্সার ও টাচ ফিক্স */
        .ashtapada-square {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer !important;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            z-index: 5;
        }

        /* প্রিমিয়াম এন্টিক হাতির দাঁত (Antique Ivory) টেক্সচার */
        .light-square { 
            background: linear-gradient(145deg, #fdfbf7 0%, #e6dcce 100%); 
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.8), inset -1px -1px 2px rgba(0,0,0,0.05);
        }
        
        /* রাজকীয় কৃষ্ণ-চন্দন (Royal Dark Sandalwood) টেক্সচার */
        .dark-square { 
            background: linear-gradient(145deg, #421d0f 0%, #1f0b03 100%); 
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.05), inset -1px -1px 3px rgba(0,0,0,0.6);
        }
        
        /* প্রথাগত অষ্টপদ ইনলেই স্টার চিহ্ন */
        .marked-square::after {
            content: "✦";
            position: absolute;
            color: #b45309;
            opacity: 0.35;
            font-size: 1.4rem;
            z-index: 1;
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
        }
        .dark-square.marked-square::after {
            color: #f59e0b;
            opacity: 0.2;
            text-shadow: 0 -1px 1px rgba(0,0,0,0.6);
        }
        
        /* সিলেকশনের সময় রাজকীয় ডিপ ভেলভেট রেড ও গোল্ডেন বর্ডার গ্লো */
        .selected { 
            background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%) !important; 
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.6), 0 0 8px #d4af37 !important;
            border: 2px solid #d4af37 !important;
            z-index: 20;
        }
        
        /* পরিমার্জিত চাল নির্দেশক (Glowing Topaz Pulse Ring) */
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: transparent;
            border: 3.5px solid #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 10px #f59e0b, inset 0 0 4px #f59e0b;
            z-index: 25;
            pointer-events: none;
            animation: pulseMarker 1.5s infinite ease-in-out;
        }
        
        @keyframes pulseMarker {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        /* রক্তাভ প্রিমিয়াম ক্যাপচার মার্কার */
        .possible-capture-marker {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.45) 0%, rgba(127, 29, 29, 0.6) 100%) !important;
            box-shadow: inset 0 0 12px #dc2626, 0 0 8px #dc2626 !important;
            border: 2px dashed #dc2626 !important;
            z-index: 20;
        }

        .heritage-card {
            background: linear-gradient(135deg, rgba(42, 20, 10, 0.95) 0%, rgba(18, 3, 0, 0.98) 100%);
            border: 1px solid #b45309;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="text-center my-3 select-none">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600 tracking-widest drop-shadow-lg">चतुरंग (CHATURANGA)</h1>
        <p class="text-amber-600/80 text-[10px] mt-0.5 font-sans tracking-widest uppercase">Ancient Indian Military Path-Blocking Engine</p>
    </div>

    <div id="mode-panel" class="flex gap-2 mb-4 heritage-card p-1.5 rounded-lg w-full max-w-[400px] justify-between items-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40">
            👥 Pass & Play
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition font-sans shadow-md shadow-amber-600/20">
            🤖 VS Computer AI
        </button>
        <button onclick="triggerReset()" class="px-3 py-2 text-[11px] font-bold bg-stone-950 text-red-400 rounded border border-red-900/30 cursor-pointer transition font-sans">
            🔄 Reset
        </button>
    </div>

    <div class="w-full max-w-[400px] flex justify-center mb-4">
        <div id="board" class="ashtapada-board"></div>
    </div>

    <div class="heritage-card p-3 rounded-lg w-full max-w-[400px] grid grid-cols-2 gap-3">
        <div>
            <h4 id="loss-title-1" class="text-amber-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Your Losses</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/40 p-1.5 rounded min-h-[36px] border border-stone-900"></div>
        </div>
        <div>
            <h4 id="loss-title-2" class="text-red-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Computer Losses</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/40 p-1.5 rounded min-h-[36px] border border-stone-900"></div>
        </div>
    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-stone-950 border border-amber-500 p-6 rounded-xl max-w-xs w-full text-center shadow-2xl">
            <div id="modalIcon" class="text-4xl mb-2">⚜️</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 tracking-wide uppercase">Battle Settled</h2>
            <p id="modalDesc" class="text-stone-400 text-xs my-3 font-sans leading-relaxed"></p>
            <button onclick="triggerReset()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-bold rounded-lg shadow-md text-xs font-sans uppercase tracking-wider cursor-pointer">
                🔄 Restart Battle
            </button>
        </div>
    </div>
        <script>
        const RENDER_API_URL = "https://chaturanga-6wdo.onrender.com/api"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        let gameMetrics = {
            currentStage: 1,           
            userAggressionCount: 0, 
            userMistakes: [],
            matchMoveHistory: [],
            consecutiveUserLosses: 0   
        };

        let aiDatabase = { userWinningTraps: [] };
        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${RENDER_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                }
            } catch (error) {
                console.log("Local engine dynamic fallback active.");
            }
        }

        async function syncTrapToNeonDatabase(winningMove) {
            try {
                await fetch(`${RENDER_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove })
                });
            } catch (error) {
                console.log("Offline backup generated.");
            }
        }

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-AI") {
                gameMetrics.currentStage = 1; 
                gameMetrics.consecutiveUserLosses = 0;
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            
            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
            }
            createBoard();
        }

        function generateAITeachingReport(userWon) {
            if (currentMode !== 'Vs-AI') return "Local Match Over.";
            if (userWon) {
                gameMetrics.consecutiveUserLosses = 0; 
                gameMetrics.currentStage = Math.min(gameMetrics.currentStage + 1, 3); 
                return "🎯 বিজয় অর্জিত হয়েছে! পরবর্তী রাউন্ডে কম্পিউটারের বুদ্ধি আরও বৃদ্ধি পাবে।";
            }
            gameMetrics.consecutiveUserLosses++; 
            return "🏛️ যুদ্ধ বিশ্লেষণ: পদাতিক ও অশ্ব বাহিনীকে আগে পাঠান। রাজাকে সুরক্ষিত রাখুন।";
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateAITeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="bg-stone-900 p-2.5 rounded text-left text-amber-400 text-[11px] font-sans leading-relaxed whitespace-pre-line">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];

            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2; 
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    
                    const isLight = (row + col) % 2 === 0;
                    square.className = `ashtapada-square ${isLight ? 'light-square' : 'dark-square'}`;
                    square.setAttribute('data-id', squareId);
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                        square.classList.add('selected');
                    }

                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        if (initialSetup[squareId]) {
                            square.classList.add('possible-capture-marker');
                        } else {
                            square.classList.add('possible-move-marker');
                        }
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-950' : 'text-amber-200';
                        square.innerHTML = `
                            <span class="text-xl md:text-2xl z-10 pointer-events-none filter drop-shadow-sm">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-bold z-10 uppercase font-sans tracking-tighter leading-none mt-0.5 pointer-events-none">${piece.name}</span>
                        `;
                    }
                    
                    // পিওর জাভাস্ক্রিপ্ট ক্লকিং লজিক অ্যাক্টিভেশন
                    square.onclick = function() {
                        handleSquareClick(row, col);
                    };
                    
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;

                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard(); 
                }
            } 
            else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                
                if (!isLegal) {
                    if (targetPiece && ((currentMode === '2-Player' && targetPiece.isWhite === isPlayer1Turn) || (currentMode === 'Vs-AI' && targetPiece.isWhite))) {
                        selectedSquare = { row, col, piece: targetPiece };
                        highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    } else {
                        selectedSquare = null;
                        highlightedMoves = [];
                    }
                    createBoard();
                    return;
                }

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            showEndGameModal("Battle Settled", "The AI has captured your Raja. Defeat is absolute.", "💀", false);
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            showEndGameModal("Victory Achieved", "You have checkmated and captured the enemy Raja!", "⚜️", true);
                        }
                    }
                }

                initialSetup[squareId] = selectedSquare.piece;
                delete initialSetup[fromKey];
                
                selectedSquare = null;
                highlightedMoves = [];

                if (!isGameOver) {
                    isPlayer1Turn = !isPlayer1Turn;
                    createBoard();
                    
                    if (currentMode === 'Vs-AI' && !isPlayer1Turn) {
                        setTimeout(triggerAiMoveLogic, 600);
                    }
                } else {
                    createBoard();
                }
            }
        }

        function triggerAiMoveLogic() {
            if (isGameOver) return;
            let availableAiMoves = [];

            for (let fromKey in initialSetup) {
                const piece = initialSetup[fromKey];
                if (!piece.isWhite) {
                    const [fR, fC] = fromKey.split('-').map(Number);
                    for (let tR = 0; tR < 8; tR++) {
                        for (let tC = 0; tC < 8; tC++) {
                            if (checkLegalMove(piece, fR, fC, tR, tC)) {
                                const target = initialSetup[`${tR}-${tC}`];
                                let priorityValue = 0;
                                if (target) {
                                    const weights = { "Padati": 10, "Ashva": 30, "Gaja": 30, "Ratha": 50, "Mantri": 70, "Raja": 9999 };
                                    priorityValue = weights[target.name] || 10;
                                }
                                availableAiMoves.push({ from: fromKey, to: `${tR}-${tC}`, piece: piece, weight: priorityValue });
                            }
                        }
                    }
                }
            }

            if (availableAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("Victory Achieved", "The AI has no legal movements left.", "⚜️", true);
                return;
            }

            if (gameMetrics.currentStage === 1) {
                availableAiMoves.sort(() => Math.random() - 0.5); 
            } else if (gameMetrics.currentStage === 2) {
                availableAiMoves.sort((a, b) => b.weight - a.weight || Math.random() - 0.5); 
            } else {
                availableAiMoves.sort((a, b) => b.weight - a.weight); 
            }

            const chosenMove = availableAiMoves[0];
            const targetPiece = initialSetup[chosenMove.to];

            if (targetPiece) {
                capturedWhite.push(targetPiece.name);
                if (targetPiece.name === 'Raja') {
                    isGameOver = true;
                    showEndGameModal("Battle Settled", "The AI has captured your Raja. Defeat is absolute.", "💀", false);
                }
            }

            initialSetup[chosenMove.to] = chosenMove.piece;
            delete initialSetup[chosenMove.from];

            isPlayer1Turn = true;
            createBoard();
        }

        loadGlobalAIDatabase();
        triggerReset();
    </script>
</body>
</html>
