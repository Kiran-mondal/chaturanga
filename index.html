<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <!-- জুম ও ইন্টারঅ্যাকশন সুরক্ষা (User-Scalable No) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaturanga - Royal Wood & Gold Edition</title>
    <style>
        /* ব্যাকগ্রাউন্ড ও বডি ডিজাইন */
        body { 
            background: #140b05; 
            color: #f1dec1; 
            font-family: 'Georgia', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; /* স্ক্রিন লক রাখার জন্য */
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #eab308;
            margin: 0 0 15px 0;
            font-size: 28px;
            letter-spacing: 3px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* রাজকীয় সেগুন/রোজউড ফ্রেম এবং সোনালী বর্ডার */
        .board-frame {
            padding: 12px; 
            background: linear-gradient(135deg, #3d1a06 0%, #1f0b02 100%);
            border: 6px solid #d4af37; /* সোনালী বর্ডার */
            border-radius: 10px; 
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2), 0 25px 60px rgba(0,0,0,0.8);
            width: 88vw; 
            max-width: 440px; 
            aspect-ratio: 1 / 1;
        }

        /* নিখুঁত এবং সমান্তরাল ৮x৮ গ্রিড */
        .board { 
            width: 100%; 
            height: 100%; 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(8, 1fr);
            gap: 1px; 
            background-color: #4a2511; /* গ্রিড লাইনের গাঢ় কাঠের রঙ */
            border: 1px solid #4a2511;
        }
        
        .square { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            position: relative; 
            transition: background 0.2s ease, transform 0.1s ease;
        }

        /* গুটিগুলোর টেক্সট সাইজ (রেসপন্সিভ) */
        .piece-icon {
            font-size: 26px;
            z-index: 2;
            transition: all 0.2s;
        }
        @media (max-width: 400px) {
            .piece-icon { font-size: 22px; }
        }

        /* কাঠের টেক্সচার (Teak & Rosewood) */
        .light-square { background: linear-gradient(135deg, #d9a066 0%, #b57c43 100%); }
        .dark-square { background: linear-gradient(135deg, #59250c 0%, #290e03 100%); }
        
        /* গুটি সিলেক্ট করার সময় প্রিমিয়াম গোল্ড গ্লো */
        .selected { 
            background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%) !important; 
            box-shadow: inset 0 0 15px #713f12;
        }
        .selected .piece-icon {
            transform: scale(1.1);
        }

        .piece-label { 
            font-size: 7px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 1px;
            font-family: sans-serif;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }
        .light-square .piece-label { color: #301103; }
        .dark-square .piece-label { color: #fcd34d; }
        .selected .piece-label { color: #2e1700 !important; }

        /* কন্ট্রোল বাটন */
        .btn-reset {
            margin-top: 20px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #3d1a06 0%, #250f03 100%);
            border: 2px solid #d4af37;
            color: #f1dec1;
            font-weight: bold;
            font-family: sans-serif;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }
        .btn-reset:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>चतुरंग</h1>

    <!-- রয়্যাল বোর্ড ফ্রেম -->
    <div class="board-frame">
        <div id="board" class="board"></div>
    </div>

    <button class="btn-reset" onclick="triggerReset()">🔄 RESET BOARD</button>

<script>
    // গুটিগুলোর অবিকৃত আইকন বা ইমোজি
    const pieceSigns = { 
        "Raja": "⚜️", 
        "Mantri": "📜", 
        "Gaja": "🐘", 
        "Ashva": "🐎", 
        "Ratha": "🛕", 
        "Padati": "⚔️" 
    };

    let gameState = {}; 
    let selectedSquareId = null;

    // চতুরঙ্গ সম্পূর্ণ প্রারম্ভিক আর্মি সেটআপ (8x8)
    function resetInitialSetup() {
        gameState = {
            // কালোর আর্মি (টপ সাইড - Row 0 & 1)
            "0-0": { name: "Ratha", isWhite: false },
            "0-1": { name: "Ashva", isWhite: false },
            "0-2": { name: "Gaja", isWhite: false },
            "0-3": { name: "Mantri", isWhite: false },
            "0-4": { name: "Raja", isWhite: false },
            "0-5": { name: "Gaja", isWhite: false },
            "0-6": { name: "Ashva", isWhite: false },
            "0-7": { name: "Ratha", isWhite: false },
            "1-0": { name: "Padati", isWhite: false },
            "1-1": { name: "Padati", isWhite: false },
            "1-2": { name: "Padati", isWhite: false },
            "1-3": { name: "Padati", isWhite: false },
            "1-4": { name: "Padati", isWhite: false },
            "1-5": { name: "Padati", isWhite: false },
            "1-6": { name: "Padati", isWhite: false },
            "1-7": { name: "Padati", isWhite: false },

            // সাদার আর্মি (বটম সাইড - Row 6 & 7)
            "6-0": { name: "Padati", isWhite: true },
            "6-1": { name: "Padati", isWhite: true },
            "6-2": { name: "Padati", isWhite: true },
            "6-3": { name: "Padati", isWhite: true },
            "6-4": { name: "Padati", isWhite: true },
            "6-5": { name: "Padati", isWhite: true },
            "6-6": { name: "Padati", isWhite: true },
            "6-7": { name: "Padati", isWhite: true },
            "7-0": { name: "Ratha", isWhite: true },
            "7-1": { name: "Ashva", isWhite: true },
            "7-2": { name: "Gaja", isWhite: true },
            "7-3": { name: "Mantri", isWhite: true },
            "7-4": { name: "Raja", isWhite: true },
            "7-5": { name: "Gaja", isWhite: true },
            "7-6": { name: "Ashva", isWhite: true },
            "7-7": { name: "Ratha", isWhite: true }
        };
        selectedSquareId = null;
    }

    // সমান্তরাল গ্রিড রেন্ডারিং ফাংশন
    function createBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';

        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const squareId = `${row}-${col}`;
                const isLight = (row + col) % 2 === 0;
                
                const square = document.createElement('div');
                square.className = `square ${isLight ? 'light-square' : 'dark-square'}`;
                square.setAttribute('data-id', squareId);
                
                if (selectedSquareId === squareId) {
                    square.classList.add('selected');
                }
                
                const piece = gameState[squareId];
                if (piece) {
                    square.innerHTML = `
                        <span class="piece-icon">${pieceSigns[piece.name]}</span>
                        <span class="piece-label">${piece.name}</span>
                    `;
                }
                
                square.onclick = () => handleSquareClick(squareId);
                board.appendChild(square);
            }
        }
    }

    // ইন্টারঅ্যাক্টিভ মুভমেন্ট লজিক (UX টেস্টিং-এর জন্য)
    function handleSquareClick(squareId) {
        const piece = gameState[squareId];

        if (selectedSquareId === null) {
            // ১ম ক্লিক: কোনো গুটি সিলেক্ট করা
            if (piece) {
                selectedSquareId = squareId;
                createBoard();
            }
        } else {
            // ২য় ক্লিক: গুটি সরানো বা সিলেকশন বদলানো
            if (selectedSquareId === squareId) {
                // একই ঘরে আবার ক্লিক করলে সিলেকশন বাতিল হবে
                selectedSquareId = null;
            } else {
                // গুটি নতুন ঘরে মুভ করা
                gameState[squareId] = gameState[selectedSquareId];
                delete gameState[selectedSquareId];
                selectedSquareId = null;
            }
            createBoard();
        }
    }

    function triggerReset() {
        resetInitialSetup();
        createBoard();
    }
    
    // গেম চালু করা হলো
    triggerReset();
</script>
</body>
</html>
