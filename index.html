<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="SGTtZ107eLMQ7Om77SQMue-jrOwKrMAuYfzX1BkMxUA" />
    <title>Chaturanga - Royal Sandalwood Ashtapada Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: #0a0502;
            background-image: 
                linear-gradient(rgba(10, 5, 2, 0.5), rgba(5, 2, 0, 0.75)),
                url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            animation: ambientGlow 25s ease-in-out infinite;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 🏛️ বক্সের ট্রান্সপারেন্সি বাড়ানো হয়েছে ও সোনালী বর্ডার রক্ষা করা হয়েছে */
        .heritage-card {
            background: linear-gradient(135deg, rgba(20, 10, 5, 0.6) 0%, rgba(10, 3, 0, 0.75) 100%);
            border: 1px solid rgba(180, 83, 9, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .status-card {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(180, 83, 9, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .ashtapada-board {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            border: 4px solid #b45309;
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.15), 0 15px 40px rgba(0, 0, 0, 0.9);
            border-radius: 6px;
        }

        .ashtapada-square {
            background-color: #f1dec1;
            border: 1px solid #7c2d12;
            transition: background-color 0.15s ease;
        }
        
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #7c2d12;
            opacity: 0.15;
            font-size: 1.6rem;
            font-weight: 300;
        }
        
        .selected { 
            background-color: #eab308 !important; 
            box-shadow: inset 0 0 10px #7c2d12;
        }
        
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 11px;
            height: 11px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            z-index: 10;
        }
        
        .possible-capture-marker {
            background-color: #fca5a5 !important;
            box-shadow: inset 0 0 8px #dc2626 !important;
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="text-center my-4 select-none">
        <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600 tracking-widest drop-shadow-lg uppercase">चतुरंग (CHATURANGA)</h1>
        <p class="text-amber-600/90 text-[9px] md:text-[10px] mt-1 font-sans tracking-widest uppercase font-bold">ROYAL SANDALWOOD ASHTAPADA ENGINE</p>
    </div>

    <div class="w-full max-w-[400px] flex flex-col gap-3">
        
        <div class="status-card p-3 rounded-lg flex justify-between items-center select-none">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-[10px] font-sans text-stone-300 font-bold tracking-wider uppercase">LIVE WEBSITE STATUS</span>
            </div>
            
            <div class="flex gap-4 text-right font-sans items-center">
                <div class="bg-emerald-950/40 px-2 py-1 rounded border border-emerald-500/20 flex items-center justify-center">
                    <script type="text/javascript" src="https://freecounterstat.com/online/counter.php?id=chaturanga_live&style=0001"></script>
                    <span class="text-emerald-400 font-bold text-xs ml-1 uppercase tracking-tighter">ONLINE</span>
                </div>
            </div>
        </div>

        <div id="mode-panel" class="flex gap-2 heritage-card p-1.5 rounded-lg justify-between items-center">
            <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40">
                👥 Pass & Play
            </button>
            <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition font-sans shadow-md shadow-amber-600/20">
                💻 VS Computer
            </button>
            <button id="btnReset" onclick="triggerReset()" class="px-4 py-2 text-[11px] font-bold bg-stone-950/80 text-red-400 rounded border border-red-900/40 cursor-pointer transition font-sans">
                🔄 Reset
            </button>
        </div>

        <div class="flex justify-center w-full">
            <div id="board" class="ashtapada-board grid grid-cols-8 gap-0"></div>
        </div>

        <div class="heritage-card p-3 rounded-lg grid grid-cols-2 gap-3 mb-4">
            <div>
                <h4 id="loss-title-1" class="text-amber-500/90 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Your Losses</h4>
                <div id="white-graveyard" class="flex flex-wrap gap-1 text-base bg-black/30 p-1.5 rounded min-h-[36px] border border-stone-900/40"></div>
            </div>
            <div>
                <h4 id="loss-title-2" class="text-red-500/90 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Computer Losses</h4>
                <div id="black-graveyard" class="flex flex-wrap gap-1 text-base bg-black/30 p-1.5 rounded min-h-[36px] border border-stone-900/40"></div>
            </div>
        </div>

    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-stone-950/95 border border-amber-500/50 p-6 rounded-xl max-w-xs w-full text-center shadow-2xl backdrop-blur-md">
            <div id="modalIcon" class="text-4xl mb-2">⚜️</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 tracking-wide uppercase">Battle Settled</h2>
            <p id="modalDesc" class="text-stone-300 text-xs my-3 font-sans leading-relaxed"></p>
            <button onclick="triggerReset()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-bold rounded-lg shadow-md text-xs font-sans uppercase tracking-wider cursor-pointer">
                🔄 Restart Battle
            </button>
        </div>
    </div>
    
        <script>
        // 🚀 আপনার Vercel API ডোমেন কনফিগারেশন
        const NETLIFY_API_URL = "https://chaturanga-online.netlify.app/"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        // 🧠 কম্পিউটারের লার্নিং গ্রোথ ও ব্যালেন্সড-টু-এক্সপার্ট ট্র্যাকিং স্টেট
        let gameMetrics = {
            currentStage: 1,           
            userAggressionCount: 0, 
            userMistakes: [],
            matchMoveHistory: [],
            consecutiveUserLosses: 0,
            adaptiveDifficultyScore: 50 // ৫০ = ব্যালেন্সড, ১০০ = চরম এক্সপার্ট
        };

        let aiDatabase = {
            userWinningTraps: []
        };

        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        // 🌐 Vercel থেকে কম্পিউটারের জন্য গ্লোবাল কৌশল লোড করা
        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${NETLIFY_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                    console.log("কম্পিউটার ডেটাবেস সিঙ্ক সম্পন্ন হয়েছে।");
                }
            } catch (error) {
                console.error("অফলাইন মোড সক্রিয় রয়েছে।", error);
            }
        }

        // 💾 ইউজারের নতুন কৌশল কম্পিউটারের স্মৃতিতে সেভ করা
        async function syncTrapToVercelDatabase(winningMove) {
            try {
                await fetch(`${NETLIFY_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove })
                });
                console.log("ইউজারের নতুন কৌশল কম্পিউটার সফলভাবে রক্ত করেছে।");
            } catch (error) {
                console.error("ক্লাউড সিঙ্ক বাইপাস।", error);
            }
        }
                    function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-AI") {
                gameMetrics.currentStage = 1; 
                gameMetrics.consecutiveUserLosses = 0;
                gameMetrics.adaptiveDifficultyScore = 50; 
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            
            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
            }
            createBoard();
        }

        // 🏛️ ইউজারের কৌশল বিশ্লেষণ করে কম্পিউটার নিজেকে আরও কঠিন করে তোলার মেকানিজম
        function generateAITeachingReport(userWon) {
            if (currentMode !== 'Vs-AI') return "লোকাল ম্যাচ সমাপ্ত।";
            if (userWon) {
                gameMetrics.consecutiveUserLosses = 0; 
                gameMetrics.currentStage = Math.min(gameMetrics.currentStage + 1, 3); 
                gameMetrics.adaptiveDifficultyScore = Math.min(gameMetrics.adaptiveDifficultyScore + 25, 100); 
                
                if(gameMetrics.matchMoveHistory.length > 0) {
                    const lastWinningMove = gameMetrics.matchMoveHistory[gameMetrics.matchMoveHistory.length - 1];
                    aiDatabase.userWinningTraps.push(lastWinningMove);
                    syncTrapToVercelDatabase(lastWinningMove); 
                }
                return "🎯 অভিনন্দন! আপনি কম্পিউটারকে পরাজিত করেছেন। কম্পিউটার আপনার কৌশল রক্ত করেছে এবং পরবর্তী ম্যাচে এটি আরও কঠিন (এক্সপার্ট স্তরে) চাল দেবে। বর্তমান স্তর: " + gameMetrics.currentStage;
            }

            gameMetrics.consecutiveUserLosses++; 
            let advise = "🏛️ [কম্পিউটার যুদ্ধ প্রতিবেদন]:\n";
            if (gameMetrics.consecutiveUserLosses >= 2) {
                gameMetrics.currentStage = Math.max(gameMetrics.currentStage - 1, 1);
                gameMetrics.adaptiveDifficultyScore = Math.max(gameMetrics.adaptiveDifficultyScore - 20, 50);
                gameMetrics.consecutiveUserLosses = 0;
                advise += "কম্পিউটার আপনার সুবিধার জন্য গেমের লেভেল কিছুটা ব্যালেন্সড করেছে। চালগুলো আবার লক্ষ্য করুন।";
            } else {
                advise += "কম্পিউটার এখন এক্সপার্ট স্তরে খেলছে। আপনার চালের আক্রমণাত্মক রেটিং বৃদ্ধি পেয়েছে। ";
                if (gameMetrics.userAggressionCount < 3) {
                    advise += "পদাতিক ও অশ্ব গুটিগুলো শুরুতে অলস পড়ে ছিল।";
                } else if (gameMetrics.userMistakes.includes("Raja_exposed")) {
                    advise += "বড় ভুল! আপনি আপনার রাজাকে সম্পূর্ণ অরক্ষিত অবস্থায় রেখেছিলেন।";
                } else {
                    advise += "রথ ও গজ গুটিগুলোর সঠিক ব্যবহার করা উচিত ছিল।";
                }
            }
            return advise;
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateAITeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="bg-stone-900 p-2.5 rounded text-left text-amber-400 border border-amber-900/40 text-[11px] leading-relaxed font-sans whitespace-pre-line">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
            gameMetrics.userMistakes = [];
            gameMetrics.userAggressionCount = 0;
        }
                    function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];
            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2; 
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative overflow-hidden';
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');
                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        square.classList.add(initialSetup[squareId] ? 'possible-capture-marker' : 'possible-move-marker');
                    }
                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-900' : 'text-red-900';
                        square.innerHTML = `
                            <span class="text-xl md:text-2xl z-10 filter drop-shadow-sm">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-bold z-10 uppercase font-sans tracking-tighter leading-none mt-0.5">${piece.name}</span>
                        `;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }
                    async function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;
                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                if (!isLegal) {
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) gameMetrics.userAggressionCount++;
                if (selectedSquare.piece.name === 'Raja' && row < 6) gameMetrics.userMistakes.push("Raja_exposed");

                gameMetrics.matchMoveHistory.push({ from: fromKey, to: squareId, piece: selectedSquare.piece.name });

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("DEFEAT", "কম্পিউটার আপনার রাজাকে বন্দি করেছে!", "💀", false);
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("VICTORY!", "আপনি কম্পিউটারের রাজসিংহাসন দখল করেছেন!", "👑", true);
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;
                if (currentMode === 'Vs-AI') {
                    // আপনি চাল দেওয়ার পর কম্পিউটারের চিন্তাভাবনার ক্ষুদ্র বিরতি
                    setTimeout(triggerAiEngineLogic, 300); 
                } else {
                    isPlayer1Turn = !isPlayer1Turn;
                }
            }
        }

        function evaluateBoardState() {
            const scores = { 'Raja': 10000, 'Mantri': 90, 'Ratha': 50, 'Gaja': 40, 'Ashva': 30, 'Padati': 10 };
            let totalVal = 0;
            for (const key in initialSetup) {
                const piece = initialSetup[key];
                const [r, c] = key.split('-').map(Number);
                let weight = scores[piece.name];
                if (piece.name === 'Padati') weight += piece.isWhite ? (7 - r) : r;
                if (piece.isWhite) totalVal -= weight; else totalVal += weight;
            }
            return totalVal;
                                }
                    function minimax(depth, isAiMaximizing) {
            if (depth === 0 || isGameOver) return evaluateBoardState();
            const aiMoves = [];
            for (const key in initialSetup) {
                const isWhitePiece = initialSetup[key].isWhite;
                if ((isAiMaximizing && !isWhitePiece) || (!isAiMaximizing && isWhitePiece)) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) {
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                aiMoves.push({ from: key, to: `${toR}-${toC}`, piece: piece });
                            }
                        }
                    }
                }
            }
            if (aiMoves.length === 0) return evaluateBoardState();

            if (isAiMaximizing) {
                let maxEval = -Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, false);
                    maxEval = Math.max(maxEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, true);
                    minEval = Math.min(minEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return minEval;
            }
        }

        // 🧠 ডাইনামিকালি অ্যাডাপ্টিভ কম্পিউটার ইঞ্জিন (ব্যালেন্সড টু এক্সপার্ট মেকানিজম)
        function triggerAiEngineLogic() {
            if (isGameOver) return;
            const allLegalAiMoves = [];
            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("STALEMATE", "যুদ্ধটি অমীমাংসিত রয়ে গেল (ড্র)।", "🏳️", false);
                return;
            }

            // 🎯 ডাইনামিক প্রগ্রেশন: স্টেজের ওপর ভিত্তি করে কম্পিউটারের গভীরতা নির্ধারণ
            if (gameMetrics.currentStage === 1) {
                // ব্যালেন্সড স্টেজ: কিছুটা সরল এবং স্বাভাবিক চাল
                allLegalAiMoves.sort((a, b) => Math.random() - 0.5);
            } else if (gameMetrics.currentStage === 2) {
                // ইন্টারমিডিয়েট স্টেজ: একটু হিসেবি চাল
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = evaluateBoardState(); 
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            } else {
                // এক্সপার্ট স্টেজ: আপনার পূর্ববর্তী ফাঁদ ও মিনিম্যাক্স অ্যালগরিদম রক্ত করে কঠিনতম চাল
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = minimax(2, false); 
                    
                    // আপনার পুরোনো জেতার কৌশল লক্ষ্য করে কম্পিউটার নিজেকে ডিফেন্ড করবে
                    aiDatabase.userWinningTraps.forEach(trap => {
                        if (trap.to === move.toKey) move.minimaxWeight += 250;
                    });
                    
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            }
            
            const bestMove = allLegalAiMoves[0]; 
            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("DEFEAT", "কম্পিউটার আপনার রাজাকে বন্দি করেছে!", "💀", false);
                    return;
                }
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };
            createBoard();
        }

        loadGlobalAIDatabase();
        triggerReset();
    </script>
