<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaturanga - Royal Sandalwood Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: #1c0f06;
            /* রাজকীয় প্রাচীন ব্যাকগ্রাউন্ড */
            background-image: 
                linear-gradient(rgba(15, 7, 2, 0.5), rgba(5, 2, 0, 0.8)),
                url('https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 👑 চন্দন কাঠের বোর্ড এবং খোদাই করা সোনালী মেটালিক বর্ডার */
        .ashtapada-board {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            padding: 12px; /* বর্ডারের রাজকীয় ফ্রেমের জন্য */
            background: linear-gradient(135deg, #2b1408 0%, #170a04 100%); /* রোজউড ফ্রেম */
            border: 5px double #d4af37; /* সোনালী মেটালিক ডাবল বর্ডার */
            box-shadow: 
                0 0 0 2px #170a04,
                inset 0 0 15px rgba(0,0,0,0.8),
                0 25px 60px rgba(0, 0, 0, 0.95);
            border-radius: 4px; /* প্রাচীন কাঠের ক্লাসিক শার্প লুক */
        }

        /* স্কয়ার ইন্টারঅ্যাকশন এবং কাঠের গভীরতা */
        .ashtapada-square {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer !important;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            z-index: 5;
        }

        /* 🦴 হাতির দাঁতের (Antique Ivory) তৈরি মসৃণ হালকা ঘর */
        .light-square { 
            background: linear-gradient(145deg, #f7f3e9 0%, #dfd5c3 100%); 
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.7), inset -1px -1px 3px rgba(0,0,0,0.1);
        }
        
        /* 🪵 রাজকীয় কৃষ্ণ-চন্দন ও রোজউড (Dark Sandalwood) কাঠের ডার্ক ঘর */
        .dark-square { 
            background: linear-gradient(145deg, #3d1b0c 0%, #1f0d05 100%); 
            /* কাঠের আঁশ বা ফাইবারের মতো সূক্ষ্ম টেক্সচার ইলিউশন */
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.05);
        }
        
        /* প্রথাগত অষ্টপদ ইনলেই স্টার চিহ্ন (কাঠের ওপর খোদাই করা নকশা) */
        .marked-square::after {
            content: "✦";
            position: absolute;
            color: #8c431d;
            opacity: 0.5;
            font-size: 1.3rem;
            z-index: 1;
        }
        .dark-square.marked-square::after {
            color: #d4af37; /* ডার্ক উডের ওপর সোনালী খোদাই */
            opacity: 0.3;
        }
        
        /* গুটি সিলেক্ট হলে ব্রোঞ্জ বা তামার খোদাই করা রাজকীয় বর্ডার */
        .selected { 
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.7) !important;
            border: 3px solid #d4af37 !important; /* সোনালী সিলেকশন */
            z-index: 20;
        }
        
        /* যান্ত্রিক নিয়ন গ্লো বাদ—তার বদলে কাঠের ওপর ব্রাস/পিত্তলের গোল রিং (Brass Inlay Marker) */
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            background: transparent;
            border: 2.5px solid #b38f2d; /* মেটালিক গোল্ড রিং */
            border-radius: 50%;
            opacity: 0.85;
            z-index: 25;
            pointer-events: none;
        }
        
        /* শত্রু কাটার ঘর—গাঢ় তামার রঙের ড্যাশ বর্ডার */
        .possible-capture-marker {
            box-shadow: inset 0 0 10px rgba(139, 0, 0, 0.5) !important;
            border: 2.5px dashed #aa2b2b !important;
            z-index: 20;
        }

        /* হেরিটেজ কন্টেইনার কার্ড */
        .heritage-card {
            background: linear-gradient(135deg, rgba(38, 18, 8, 0.98) 0%, rgba(18, 7, 2, 0.99) 100%);
            border: 2px solid #8c431d;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-stone-200 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="text-center my-3 select-none">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-amber-600 to-yellow-700 tracking-widest drop-shadow-md">चतुरंग</h1>
        <p class="text-amber-700 font-sans text-[9px] mt-0.5尊 tracking-widest uppercase font-bold">Royal Sandalwood Ashtapada Engine</p>
    </div>

    <div id="mode-panel" class="flex gap-2 mb-4 heritage-card p-1.5 w-full max-w-[400px] justify-between items-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900/80 text-amber-600 rounded-sm cursor-pointer transition font-sans border border-amber-900/40">
            👥 Pass & Play
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold bg-amber-700 text-stone-950 rounded-sm cursor-pointer transition font-sans shadow-md">
            🤖 VS Computer AI
        </button>
        <button onclick="triggerReset()" class="px-3 py-2 text-[11px] font-bold bg-stone-950 text-red-500 rounded-sm border border-red-950 cursor-pointer transition font-sans">
            🔄 Reset
        </button>
    </div>

    <div class="w-full max-w-[400px] flex justify-center mb-4">
        <div id="board" class="ashtapada-board"></div>
    </div>

    <div class="heritage-card p-3 w-full max-w-[400px] grid grid-cols-2 gap-3">
        <div>
            <h4 id="loss-title-1" class="text-amber-600 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Your Losses</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/60 p-1.5 rounded-sm min-h-[36px] border border-stone-900"></div>
        </div>
        <div>
            <h4 id="loss-title-2" class="text-red-700 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Computer Losses</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/60 p-1.5 rounded-sm min-h-[36px] border border-stone-900"></div>
        </div>
    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
        <div class="bg-stone-950 border-2 border-amber-600 p-6 rounded-sm max-w-xs w-full text-center shadow-2xl">
            <div id="modalIcon" class="text-4xl mb-2">⚜️</div>
            <h2 id="modalTitle" class="text-lg font-black text-amber-600 tracking-wide uppercase">Battle Settled</h2>
            <p id="modalDesc" class="text-stone-400 text-xs my-3 font-sans leading-relaxed"></p>
            <button onclick="triggerReset()" class="w-full py-2 bg-gradient-to-r from-amber-600 to-amber-700 text-stone-950 font-bold rounded-sm text-xs font-sans uppercase tracking-wider cursor-pointer">
                🔄 Restart Battle
            </button>
        </div>
    </div>
        <script>
        const RENDER_API_URL = "https://chaturanga-6wdo.onrender.com/api"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        let gameMetrics = {
            currentStage: 1,           
            userAggressionCount: 0, 
            userMistakes: [],
            matchMoveHistory: [],
            consecutiveUserLosses: 0   
        };

        let aiDatabase = { userWinningTraps: [] };
        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${RENDER_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                }
            } catch (error) {
                console.log("Local engine dynamic fallback active.");
            }
        }

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-AI") {
                gameMetrics.currentStage = 1; 
                gameMetrics.consecutiveUserLosses = 0;
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-700 text-stone-950 rounded-sm font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/80 text-amber-600 rounded-sm cursor-pointer transition font-sans border border-amber-900/40';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-700 text-stone-950 rounded-sm font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/80 text-amber-600 rounded-sm cursor-pointer transition font-sans border border-amber-900/40';
            
            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
            }
            createBoard();
        }

        function showEndGameModal(title, description, icon) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = description;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];

            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2; 
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    
                    const isLight = (row + col) % 2 === 0;
                    square.className = `ashtapada-square ${isLight ? 'light-square' : 'dark-square'}`;
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');

                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        if (initialSetup[squareId]) {
                            square.classList.add('possible-capture-marker');
                        } else {
                            square.classList.add('possible-move-marker');
                        }
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-stone-900/90' : 'text-amber-100/90';
                        square.innerHTML = `
                            <span class="text-xl md:text-2xl z-10 pointer-events-none filter drop-shadow-sm">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-bold z-10 uppercase font-sans tracking-tighter leading-none mt-0.5 pointer-events-none">${piece.name}</span>
                        `;
                    }
                    
                    square.onclick = function() {
                        handleSquareClick(row, col);
                    };
                    
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;

                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard(); 
                }
            } 
            else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                
                if (!isLegal) {
                    if (targetPiece && ((currentMode === '2-Player' && targetPiece.isWhite === isPlayer1Turn) || (currentMode === 'Vs-AI' && targetPiece.isWhite))) {
                        selectedSquare = { row, col, piece: targetPiece };
                        highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    } else {
                        selectedSquare = null;
                        highlightedMoves = [];
                    }
                    createBoard();
                    return;
                }

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            showEndGameModal("Battle Settled", "The enemy has captured your Raja.", "💀");
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            showEndGameModal("Victory Achieved", "You captured the enemy Raja!", "⚜️");
                        }
                    }
                }

                initialSetup[squareId] = selectedSquare.piece;
                delete initialSetup[fromKey];
                
                selectedSquare = null;
                highlightedMoves = [];

                if (!isGameOver) {
                    isPlayer1Turn = !isPlayer1Turn;
                    createBoard();
                    
                    if (currentMode === 'Vs-AI' && !isPlayer1Turn) {
                        setTimeout(triggerAiMoveLogic, 600);
                    }
                } else {
                    createBoard();
                }
            }
        }

        function triggerAiMoveLogic() {
            if (isGameOver) return;
            let availableAiMoves = [];

            for (let fromKey in initialSetup) {
                const piece = initialSetup[fromKey];
                if (!piece.isWhite) {
                    const [fR, fC] = fromKey.split('-').map(Number);
                    for (let tR = 0; tR < 8; tR++) {
                        for (let tC = 0; tC < 8; tC++) {
                            if (checkLegalMove(piece, fR, fC, tR, tC)) {
                                const target = initialSetup[`${tR}-${tC}`];
                                let priorityValue = 0;
                                if (target) {
                                    const weights = { "Padati": 10, "Ashva": 30, "Gaja": 30, "Ratha": 50, "Mantri": 70, "Raja": 9999 };
                                    priorityValue = weights[target.name] || 10;
                                }
                                availableAiMoves.push({ from: fromKey, to: `${tR}-${tC}`, piece: piece, weight: priorityValue });
                            }
                        }
                    }
                }
            }

            if (availableAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("Victory Achieved", "The AI has no movements left.", "⚜️");
                return;
            }

            if (gameMetrics.currentStage === 1) {
                availableAiMoves.sort(() => Math.random() - 0.5); 
            } else if (gameMetrics.currentStage === 2) {
                availableAiMoves.sort((a, b) => b.weight - a.weight || Math.random() - 0.5); 
            } else {
                availableAiMoves.sort((a, b) => b.weight - a.weight); 
            }

            const chosenMove = availableAiMoves[0];
            const targetPiece = initialSetup[chosenMove.to];

            if (targetPiece) {
                capturedWhite.push(targetPiece.name);
                if (targetPiece.name === 'Raja') {
                    isGameOver = true;
                    showEndGameModal("Battle Settled", "The AI captured your Raja.", "💀");
                }
            }

            initialSetup[chosenMove.to] = chosenMove.piece;
            delete initialSetup[chosenMove.from];

            isPlayer1Turn = true;
            createBoard();
        }

        loadGlobalAIDatabase();
        triggerReset();
    </script>
</body>
</html>
