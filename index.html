<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaturanga - Animated Indian Heritage Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* ব্যাকগ্রাউন্ড অ্যানিমেশন */
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; opacity: 0.95; }
            50% { background-position: 100% 50%; opacity: 0.85; }
            100% { background-position: 0% 50%; opacity: 0.95; }
        }

        @keyframes goldPulse {
            0% { border-color: #d97706; box-shadow: 0 0 5px rgba(217, 119, 6, 0.4); }
            50% { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.7); }
            100% { border-color: #d97706; box-shadow: 0 0 5px rgba(217, 119, 6, 0.4); }
        }

        @keyframes captureWave {
            0% { box-shadow: inset 0 0 0 4px #dc2626, 0 0 0px #dc2626; }
            100% { box-shadow: inset 0 0 0 4px #dc2626, 0 0 12px 6px rgba(220, 38, 38, 0); }
        }

        body {
            background: radial-gradient(circle at center, #3a2010 0%, #120702 100%);
            background-image: 
                linear-gradient(rgba(36, 19, 9, 0.9), rgba(15, 7, 3, 0.96)),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop');
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: ambientGlow 15s ease-in-out infinite;
        }

        /* অষ্টপদ (Ashtapada) বোর্ড ও ঘর */
        .ashtapada-square {
            background-color: #f2e3c6; /* চন্দনের আভা */
            border: 1px solid #9a3412; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .ashtapada-square:hover {
            background-color: #fef3c7 !important;
            transform: scale(1.03);
            z-index: 30;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* প্রাচীন চিহ্নের (✕) ঘর */
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #9a3412;
            opacity: 0.3;
            font-size: 2.2rem;
            font-family: 'Georgia', serif;
        }
        
        /* সিলেক্টেড ঘর */
        .selected { 
            background-color: #f59e0b !important; 
            box-shadow: inset 0 0 15px #b45309;
        }
        
        /* সম্ভাব্য চালের মার্কার অ্যানিমেশন */
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #059669;
            border-radius: 50%;
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 0 10px #10b981;
        }
        
        /* আক্রমণ/কাটার ঘর */
        .possible-capture-marker {
            animation: captureWave 1.2s infinite;
            background-color: #fee2e2 !important;
        }

        /* হেরিটেজ কন্টেইনার */
        .heritage-card {
            background: linear-gradient(135deg, #45220a 0%, #261103 100%);
            border: 2px solid #d97706;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.75);
        }

        .active-turn-card {
            animation: goldPulse 2.5s infinite;
        }

        .pop-up-bounce {
            animation: transform 0.3s ease-out;
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-4 relative font-serif">

    <div class="text-center my-3 select-none">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-500 to-amber-600 tracking-widest drop-shadow-lg">चतुरङ्ग (CHATURANGA)</h1>
        <p class="text-amber-500/70 text-xs mt-1 font-sans tracking-wider uppercase">The Animated Indian Rulebook & Path-Blocking Engine</p>
    </div>

    <!-- 🎮 মোড সিলেকশন ইন্টারফেস -->
    <div id="mode-panel" class="flex gap-4 mb-3 heritage-card active-turn-card p-2 rounded-xl w-[430px] max-w-full justify-center items-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="px-3 py-2 text-xs font-bold bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition font-sans border border-amber-900/40">
            👥 Pass & Play
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg cursor-pointer transition font-sans shadow-md shadow-amber-600/20">
            🤖 VS Computer AI
        </button>
        <button onclick="triggerReset()" class="ml-2 px-2 py-2 text-xs font-bold bg-stone-950 text-amber-500 rounded-lg border border-amber-600/30 cursor-pointer hover:bg-amber-900/40 transition font-sans">
            🔄 Restart
        </button>
    </div>

    <!-- ৮x৮ অষ্টপদ বোর্ড -->
    <div id="board" class="grid grid-cols-8 gap-0 border-4 border-amber-800 rounded-lg shadow-2xl max-w-full w-[430px] h-[430px] relative bg-amber-950/40 overflow-hidden"></div>

    <!-- 📊 কবরখানা / কাটা যাওয়া ঘুঁটি (Graveyard) -->
    <div class="mt-3 heritage-card p-3 rounded-lg w-[430px] max-w-full grid grid-cols-2 gap-4">
        <div>
            <h4 class="text-red-400 font-bold text-xs mb-1 font-sans">💀 Captured AI Armies (Black)</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-xl bg-stone-950/50 p-1 rounded min-h-[36px] border border-stone-900"></div>
        </div>
        <div>
            <h4 class="text-amber-400 font-bold text-xs mb-1 font-sans">💀 Captured Your Armies (White)</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-xl bg-stone-950/50 p-1 rounded min-h-[36px] border border-stone-900"></div>
        </div>
    </div>

    <!-- ⚡ আম্পায়ার লগস -->
    <div class="mt-3 heritage-card p-3 rounded-lg w-[430px] max-w-full">
        <h3 class="text-amber-400 font-bold mb-1 text-xs font-sans tracking-wide">⚡ Match Umpire Logs</h3>
        <p id="status" class="text-amber-200/80 text-xs leading-relaxed font-sans">System Live. Welcome to the authentic Chaturanga arena.</p>
    </div>

    <!-- 🏆 বিজয়ী ঘোষণার পপআপ মোডাল -->
    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
        <div class="bg-stone-900 border-2 border-amber-500 p-6 rounded-2xl max-w-sm w-full text-center shadow-2xl pop-up-bounce">
            <div id="modalIcon" class="text-5xl mb-2">🏆</div>
            <h2 id="modalTitle" class="text-2xl font-black text-amber-500 tracking-wide uppercase">Victory!</h2>
            <p id="modalDesc" class="text-stone-300 text-sm my-4 leading-relaxed font-sans"></p>
            <button onclick="triggerReset()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-extrabold rounded-xl shadow-lg hover:from-amber-600 hover:to-amber-700 transition cursor-pointer text-sm tracking-wider uppercase font-sans">
                🔄 Start New Match
            </button>
        </div>
    </div>
        <script>
        const pieceSigns = { "Raja": "👑", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "🛡️" };
        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isWhitesTurn = true; 

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isWhitesTurn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg cursor-pointer font-sans shadow-md' : 'px-3 py-2 text-xs font-bold bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition font-sans border border-amber-900/40';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg cursor-pointer font-sans shadow-md' : 'px-3 py-2 text-xs font-bold bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition font-sans border border-amber-900/40';
            
            statusElement.innerText = currentMode === 'Vs-AI' ? "Arena updated with animations. VS Computer AI Mode Active." : "Arena updated with animations. Pass & Play Friend Mode Active.";
            createBoard();
        }

        function showEndGameModal(title, description, icon) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = description;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];

            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) {
                        return !target; 
                    }
                    if (colDiff === 1 && toR === fromR + dir) {
                        return target && target.isWhite !== piece.isWhite;
                    }
                    return false;
                    
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) {
                            return false; 
                        }
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                    
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                    
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2;
                    
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                    
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                    
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) {
                        validDestinations.push(`${r}-${c}`);
                    }
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative';
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');

                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        if (initialSetup[squareId]) {
                            square.classList.add('possible-capture-marker');
                        } else {
                            square.classList.add('possible-move-marker');
                        }
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-950' : 'text-red-950';
                        square.innerHTML = `<span class="text-2xl z-10 filter drop-shadow-sm transform transition duration-300 hover:scale-110">${pieceSigns[piece.name]}</span><span class="text-[8px] ${labelColor} font-bold z-10 leading-none font-sans mt-0.5">${piece.name}</span>`;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        async function handleSquareClick(row, col) {
            if (isGameOver) return;

            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isWhitesTurn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;

                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                
                if (!isLegal) {
                    statusElement.innerText = `❌ Invalid Move! Try again.`;
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("Game Over", "AI Captured your Raja! Black Armies win the battlefield.", "💀");
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("Congratulations!", "Victory! You captured the AI Raja successfully!", "👑");
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;

                if (currentMode === 'Vs-AI') {
                    statusElement.innerText = `AI is processing its counter-strategy instantly...`;
                    setTimeout(runAdvancedAiTurn, 400);
                } else {
                    isWhitesTurn = !isWhitesTurn;
                    statusElement.innerText = `Turn switched to ${isWhitesTurn ? 'White' : 'Black'}.`;
                }
            }
        }

        function runAdvancedAiTurn() {
            if (isGameOver) return;
            const allLegalAiMoves = [];

            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                let weight = 1;
                                if (target) {
                                    weight = target.name === 'Raja' ? 100 : (target.name === 'Mantri' ? 30 : 10);
                                }
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, weight: weight, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("Match Dropped", "The battlefield is stalled. AI has no legal moves left. It's a DRAW!", "🏳️");
                return;
            }

            allLegalAiMoves.sort((a, b) => b.weight - a.weight);
            const bestMove = allLegalAiMoves[0]; 

            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("Game Over", "AI Captured your Raja! Black Armies win the battlefield.", "💀");
                    return;
                } else {
                    statusElement.innerText = `🤖 AI captured your ${bestMove.targetPiece.name}!`;
                }
            } else {
                statusElement.innerText = `🤖 AI moved ${bestMove.piece.name} strictly to [${bestMove.toKey}].`;
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };

            createBoard();
        }

        triggerReset();
    </script>
</body>
</html>
