<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Chaturanga Online - Play Royal Sandalwood Ashtapada Game</title>
    <meta name="description" content="Play the ancient Indian chess game Chaturanga online. Battle against a smart, adaptive computer engine or invite a friend for a pass-and-play match. No download required!">
    <meta name="keywords" content="Chaturanga, ancient chess, Ashtapada, Indian board game, play Chaturanga online, chess origins, historical board game">
    <meta name="author" content="Kiran Mondal">

    <meta property="og:title" content="Chaturanga Online - Royal Sandalwood Ashtapada Game">
    <meta property="og:description" content="Challenge the classic balanced computer engine in a historical game of Chaturanga. Experience premium tactical board gaming.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop">
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 🌌 Ambient Background Animation */
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: #2a1808;
            background-image: 
                linear-gradient(rgba(18, 9, 3, 0.25), rgba(8, 2, 0, 0.45)),
                url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            animation: ambientGlow 25s ease-in-out infinite;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 👑 Main Ashtapada Board */
        .ashtapada-board {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            padding: 10px; 
            background: linear-gradient(135deg, rgba(43, 20, 8, 0.8) 0%, rgba(23, 10, 4, 0.85) 100%); 
            border: 5px double #d4af37; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.95);
            border-radius: 6px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .ashtapada-square {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer !important;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            z-index: 5;
        }

        .light-square { 
            background: linear-gradient(145deg, rgba(253, 251, 247, 0.9) 0%, rgba(230, 220, 206, 0.85) 100%); 
        }
        
        .dark-square { 
            background: linear-gradient(145deg, rgba(61, 27, 12, 0.85) 0%, rgba(31, 13, 5, 0.9) 100%); 
        }
        
        .marked-square::after {
            content: "✦";
            position: absolute;
            color: #8c431d;
            opacity: 0.45;
            font-size: 1.3rem;
        }
        
        .selected { 
            border: 3px solid #d4af37 !important; 
            z-index: 20;
        }
        
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2.5px solid #b38f2d; 
            border-radius: 50%;
        }
        
        .possible-capture-marker {
            border: 2.5px dashed #aa2b2b !important;
        }

        /* 🔮 Premium Glassmorphism Box */
        .heritage-card {
            background: linear-gradient(135deg, rgba(35, 15, 5, 0.4) 0%, rgba(15, 2, 0, 0.5) 100%);
            border: 1px solid rgba(212, 175, 55, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* 🟢 Pulse Blink Animation */
        .pulse-dot {
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulseBlink 1.8s infinite;
        }
        @keyframes pulseBlink {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="text-center my-3 select-none">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600 tracking-widest drop-shadow-lg">चतुरंग (CHATURANGA)</h1>
        <p class="text-amber-600/80 text-[10px] mt-0.5 font-sans tracking-widest uppercase">Royal Sandalwood Ashtapada Engine</p>
    </div>

    <div class="heritage-card p-3 rounded-lg w-full max-w-[400px] mb-3 border border-amber-500/20 shadow-xl">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="pulse-dot"></span>
                <span class="text-[10px] font-bold tracking-wider font-sans text-stone-300 uppercase">Live Website Status</span>
            </div>
            <div class="flex gap-4 text-right">
                <div>
                    <span id="online-users" class="text-xs font-bold text-emerald-400 font-sans">1</span>
                    <span class="block text-[8px] text-stone-400 font-sans uppercase">Online Now</span>
                </div>
                <div class="border-l border-amber-900/30 pl-4">
                    <span id="active-matches" class="text-xs font-bold text-amber-400 font-sans">0</span>
                    <span class="block text-[8px] text-stone-400 font-sans uppercase">In Battles</span>
                </div>
            </div>
        </div>
    </div>

    <div id="mode-panel" class="flex gap-2 mb-4 heritage-card p-1.5 rounded-lg w-full max-w-[400px] justify-between items-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/30">
            👥 Pass & Play
        </button>
        <button id="btnComputer" onclick="switchMode('Vs-Computer')" class="flex-1 py-2 text-[11px] font-bold bg-amber-600/80 text-stone-950 rounded cursor-pointer transition font-sans shadow-md border border-amber-500/30">
            💻 VS Computer
        </button>
        <button onclick="triggerReset()" class="px-3 py-2 text-[11px] font-bold bg-stone-950/70 text-red-400 rounded border border-red-900/30 cursor-pointer transition font-sans">
            🔄 Reset
        </button>
    </div>

    <div class="w-full max-w-[400px] flex justify-center mb-4">
        <div id="board" class="ashtapada-board"></div>
    </div>

    <div class="heritage-card p-3 rounded-lg w-full max-w-[400px] grid grid-cols-2 gap-3">
        <div>
            <h4 id="loss-title-1" class="text-amber-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Your Losses</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/30 p-1.5 rounded min-h-[36px] border border-stone-900/40"></div>
        </div>
        <div>
            <h4 id="loss-title-2" class="text-red-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Computer Losses</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/30 p-1.5 rounded min-h-[36px] border border-stone-900/40"></div>
        </div>
    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
        <div class="bg-stone-950/95 border border-amber-500 p-6 rounded-xl max-w-xs w-full text-center shadow-2xl backdrop-blur-md">
            <div id="modalIcon" class="text-4xl mb-2">⚜️</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 tracking-wide uppercase">Battle Settled</h2>
            <div id="modalDesc" class="text-stone-400 text-xs my-3 font-sans leading-relaxed"></div>
            <button onclick="triggerReset()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-bold rounded-lg shadow-md text-xs font-sans uppercase tracking-wider cursor-pointer">
                🔄 Restart Battle
            </button>
        </div>
    </div>
        <script>
        const RENDER_API_URL = "https://chaturanga-6wdo.onrender.com/api"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        // 🆔 Standard UUID Generation for Modern Browsers (Android 10+)
        if (!localStorage.getItem('chaturanga_visitor_uid')) {
            localStorage.setItem('chaturanga_visitor_uid', crypto.randomUUID());
        }
        const VISITOR_ID = localStorage.getItem('chaturanga_visitor_uid');

        let gameMetrics = {
            currentStage: 2,           
            userAggressionCount: 0,    
            matchMoveHistory: [],
            consecutiveUserLosses: 0   
        };

        let strategyDatabase = { userWinningTraps: [] };
        let currentMode = "Vs-Computer"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        // 🟢 Modern Real-Time Traffic Syncer
        async function updateLiveTrafficAnalytics() {
            try {
                const response = await fetch(`${RENDER_API_URL}/live-counters?visitorId=${VISITOR_ID}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('online-users').innerText = data.onlineNow || 1;
                    document.getElementById('active-matches').innerText = data.inBattles || 0;
                }
            } catch (error) {
                document.getElementById('online-users').innerText = "1";
                document.getElementById('active-matches').innerText = (gameMetrics.matchMoveHistory.length > 0 && !isGameOver) ? "1" : "0";
            }
        }

        // 📡 Global Real-Time Activity Dispatcher
        async function reportMatchActivity(status, currentMoveLog = "") {
            try {
                await fetch(`${RENDER_API_URL}/report-activity`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        status: status, 
                        mode: currentMode,
                        visitorId: VISITOR_ID,
                        lastAction: currentMoveLog
                    })
                });
            } catch (e) {}
        }

        async function loadGlobalDatabase() {
            try {
                const response = await fetch(`${RENDER_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    strategyDatabase.userWinningTraps = data.traps || [];
                }
            } catch (error) {}
        }

        async function syncTrapToDatabase(winningMove) {
            try {
                await fetch(`${RENDER_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove, timestamp: new Date() })
                });
            } catch (error) {}
        }

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-Computer") {
                gameMetrics.currentStage = 2; 
                gameMetrics.userAggressionCount = 0;
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null; highlightedMoves = []; isPlayer1Turn = true; isGameOver = false;
            capturedWhite = []; capturedBlack = []; gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600/80 text-stone-950 rounded font-sans shadow border border-amber-500/30' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/30';
            document.getElementById('btnComputer').className = currentMode === 'Vs-Computer' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600/80 text-stone-950 rounded font-sans shadow border border-amber-500/30' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/30';
            
            if (currentMode === 'Vs-Computer') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
            }
            createBoard();
            reportMatchActivity("ended", "Battle restarted"); 
        }

        function generateTeachingReport(userWon) {
            if (currentMode !== '2-Player' && userWon) {
                gameMetrics.currentStage = 3; 
                if(gameMetrics.matchMoveHistory.length > 0) syncTrapToDatabase(gameMetrics.matchMoveHistory.slice(-2).join("->"));
                return "🎯 Exceptional Tactics! The computer has detected you as an advanced master-level competitor and calibrated its calculations to Stage 3 for maximum challenge.";
            }
            return "🏛️ Strategic Analysis: Control the 4 central cells of the Ashtapada. Utilize your Padati rows to construct unified defensive walls.";
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateTeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="bg-stone-900/90 p-2.5 text-left text-amber-500 text-[11px] font-sans leading-relaxed whitespace-pre-line border border-amber-900/40">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
            reportMatchActivity("ended", `Match finished - ${title}`); 
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7 || (fromR === toR && fromC === toC)) return false;
            const rowDiff = Math.abs(toR - fromR), colDiff = Math.abs(toC - fromC), target = initialSetup[`${toR}-${toC}`];
            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1), stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR, checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; checkR += stepR; checkC += stepC;
                    }
                    return true;
                case 'Ashva': return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': return rowDiff === 2 && colDiff === 2; 
                case 'Raja': return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri': return rowDiff === 1 && colDiff === 1;
                default: return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) { if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`); }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`, square = document.createElement('div'), isLight = (row + col) % 2 === 0;
                    square.className = `ashtapada-square ${isLight ? 'light-square' : 'dark-square'}`;
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');
                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        square.classList.add(initialSetup[squareId] ? 'possible-capture-marker' : 'possible-move-marker');
                    }
                    const piece = initialSetup[squareId];
                    if (piece) {
                        square.innerHTML = `<span class="text-xl md:text-2xl z-10 pointer-events-none filter drop-shadow-sm">${pieceSigns[piece.name]}</span><span class="text-[7px] ${piece.isWhite ? 'text-stone-900/90' : 'text-amber-100/90'} font-bold z-10 uppercase font-sans tracking-tighter mt-0.5 pointer-events-none">${piece.name}</span>`;
                    }
                    square.onclick = function() { handleSquareClick(row, col); };
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }        function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`, targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-Computer' && !targetPiece.isWhite) return;
                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard(); 
                }
            } 
            else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`, isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                if (!isLegal) {
                    if (targetPiece && ((currentMode === '2-Player' && targetPiece.isWhite === isPlayer1Turn) || (currentMode === 'Vs-Computer' && targetPiece.isWhite))) {
                        selectedSquare = { row, col, piece: targetPiece }; highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    } else { selectedSquare = null; highlightedMoves = []; }
                    createBoard(); return;
                }

                // 📢 Background Data Logging Core
                let moveLogText = `White moved ${selectedSquare.piece.name} to [${row},${col}]`;
                if (targetPiece) moveLogText = `White ${selectedSquare.piece.name} captured Black ${targetPiece.name}! 🔥`;
                reportMatchActivity("playing", moveLogText);

                gameMetrics.matchMoveHistory.push(`${fromKey}:${selectedSquare.piece.name}->${squareId}`);
                if (targetPiece && !targetPiece.isWhite) {
                    gameMetrics.userAggressionCount++;
                    if (gameMetrics.userAggressionCount >= 2 && gameMetrics.currentStage === 2) gameMetrics.currentStage = 3;
                }

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') { isGameOver = true; showEndGameModal("Battle Settled", "The computer has captured your Raja.", "💀", false); }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') { isGameOver = true; showEndGameModal("Victory Achieved", "You have captured the enemy Raja!", "⚜️", true); }
                    }
                }

                initialSetup[squareId] = selectedSquare.piece; delete initialSetup[fromKey];
                selectedSquare = null; highlightedMoves = [];

                if (!isGameOver) {
                    isPlayer1Turn = !isPlayer1Turn; createBoard();
                    if (currentMode === 'Vs-Computer' && !isPlayer1Turn) setTimeout(triggerComputerMoveLogic, 600);
                } else { createBoard(); }
            }
        }

        function triggerComputerMoveLogic() {
            if (isGameOver) return;
            let availableMoves = [];
            for (let fromKey in initialSetup) {
                const piece = initialSetup[fromKey];
                if (!piece.isWhite) {
                    const [fR, fC] = fromKey.split('-').map(Number);
                    for (let tR = 0; tR < 8; tR++) {
                        for (let tC = 0; tC < 8; tC++) {
                            if (checkLegalMove(piece, fR, fC, tR, tC)) {
                                const target = initialSetup[`${tR}-${tC}`]; let priorityValue = 0;
                                if (target) {
                                    const weights = { "Padati": 15, "Ashva": 35, "Gaja": 40, "Ratha": 55, "Mantri": 75, "Raja": 99999 };
                                    priorityValue = weights[target.name] || 15;
                                    if (target.name === 'Raja') priorityValue += 1000;
                                }
                                if (tR >= 3 && tR <= 4 && tC >= 3 && tC <= 4) priorityValue += 8;
                                availableMoves.push({ from: fromKey, to: `${tR}-${tC}`, piece: piece, weight: priorityValue });
                            }
                        }
                    }
                }
            }

            if (availableMoves.length === 0) { isGameOver = true; showEndGameModal("Victory Achieved", "The computer has no movements left.", "⚜️", true); return; }
            if (gameMetrics.currentStage === 2) { availableMoves.sort((a, b) => b.weight - a.weight || Math.random() - 0.5); } 
            else { availableMoves.sort((a, b) => b.weight - a.weight); }

            const chosenMove = availableMoves[0], targetPiece = initialSetup[chosenMove.to];
            
            // 📢 Bot Action Logger
            let botLogText = `Computer moved ${chosenMove.piece.name} to [${chosenMove.to}]`;
            if (targetPiece) botLogText = `Computer captured your ${targetPiece.name}! ⚠️`;
            reportMatchActivity("playing", botLogText);

            if (targetPiece) {
                capturedWhite.push(targetPiece.name);
                if (targetPiece.name === 'Raja') { isGameOver = true; showEndGameModal("Battle Settled", "The computer has captured your Raja.", "💀", false); }
            }
            initialSetup[chosenMove.to] = chosenMove.piece; delete initialSetup[chosenMove.from];
            isPlayer1Turn = true; createBoard();
        }

        loadGlobalDatabase();
        updateLiveTrafficAnalytics();
        setInterval(updateLiveTrafficAnalytics, 3500); 
        triggerReset();
    </script>
