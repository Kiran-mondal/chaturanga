<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaturanga - Ancient Indian Heritage Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: radial-gradient(circle at center, #261103 0%, #080200 100%);
            background-image: 
                linear-gradient(rgba(26, 12, 3, 0.9), rgba(8, 2, 0, 0.98)),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop');
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: ambientGlow 20s ease-in-out infinite;
            overflow-x: hidden;
        }

        .ashtapada-board {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            border: 6px solid #7c2d12;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
            border-radius: 8px;
        }

        .ashtapada-square {
            background-color: #f1dec1;
            border: 1px solid #7c2d12;
            transition: background-color 0.15s ease;
        }
        
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #7c2d12;
            opacity: 0.2;
            font-size: 1.8rem;
            font-weight: 300;
        }
        
        .selected { 
            background-color: #eab308 !important; 
            box-shadow: inset 0 0 10px #7c2d12;
        }
        
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            z-index: 10;
        }
        
        .possible-capture-marker {
            background-color: #fca5a5 !important;
            box-shadow: inset 0 0 8px #dc2626 !important;
        }

        .heritage-card {
            background: linear-gradient(135deg, #261103 0%, #120500 100%);
            border: 1px solid #b45309;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="text-center my-3 select-none">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600 tracking-widest drop-shadow-lg">चतुरङ्ग (CHATURANGA)</h1>
        <p class="text-amber-600/80 text-[10px] mt-0.5 font-sans tracking-widest uppercase">Ancient Indian Military Path-Blocking Engine</p>
    </div>

    <div id="mode-panel" class="flex gap-2 mb-4 heritage-card p-1.5 rounded-lg w-full max-w-[400px] justify-between items-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40">
            👥 Pass & Play
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition font-sans shadow-md shadow-amber-600/20">
            🤖 VS Computer AI
        </button>
        <button onclick="triggerReset()" class="px-3 py-2 text-[11px] font-bold bg-stone-950 text-red-400 rounded border border-red-900/30 cursor-pointer transition font-sans">
            🔄 Reset
        </button>
    </div>

    <div class="w-full max-w-[400px] flex justify-center mb-4">
        <div id="board" class="ashtapada-board grid grid-cols-8 gap-0"></div>
    </div>

    <div class="heritage-card p-3 rounded-lg w-full max-w-[400px] grid grid-cols-2 gap-3">
        <div>
            <h4 id="loss-title-1" class="text-amber-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Player 1 Losses</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/40 p-1.5 rounded min-h-[36px] border border-stone-900"></div>
        </div>
        <div>
            <h4 id="loss-title-2" class="text-red-400 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 Computer Losses</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-lg bg-stone-950/40 p-1.5 rounded min-h-[36px] border border-stone-900"></div>
        </div>
    </div>

    <div class="mt-3 heritage-card p-3 rounded-lg w-full max-w-[400px]">
        <h3 class="text-amber-500 font-bold mb-0.5 text-[10px] font-sans tracking-wider uppercase">⚡ Royal Court Chronicle</h3>
        <p id="status" class="text-amber-100/70 text-[11px] font-bold leading-relaxed font-sans"></p>
    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-stone-950 border border-amber-500 p-6 rounded-xl max-w-xs w-full text-center shadow-2xl">
            <div id="modalIcon" class="text-4xl mb-2">⚜️</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 tracking-wide uppercase">Battle Settled</h2>
            <p id="modalDesc" class="text-stone-400 text-xs my-3 font-sans leading-relaxed"></p>
            <button onclick="triggerReset()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-bold rounded-lg shadow-md text-xs font-sans uppercase tracking-wider cursor-pointer">
                🔄 Restart Battle
            </button>
        </div>
    </div>
        <script>
        // 🔗 আপনার আসল রেন্ডার ক্লাউড এপিআই লিংক এখানে সেট করে দেওয়া হয়েছে
        const RENDER_API_URL = "https://chaturanga-6wdo.onrender.com/api"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        let gameMetrics = {
            matchesPlayed: 0,
            userAggressionCount: 0, 
            userMistakes: [],
            matchMoveHistory: []
        };

        let aiDatabase = {
            userWinningTraps: []
        };

        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        // ১. নিয়ন ক্লাউড ডাটাবেস থেকে গ্লোবাল চালের ট্র্যাপগুলো নিয়ে আসা
        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${RENDER_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                    console.log("Global AI look-ahead patterns synced with Neon Cloud via Render.");
                }
            } catch (error) {
                console.error("Neon DB connection bypass. Using frontend cache.", error);
            }
        }

        // ২. নতুন সফল জয়ের কৌশল নিয়ন ক্লাউড ডাটাবেসে সেভ করা
        async function syncTrapToNeonDatabase(winningMove) {
            try {
                await fetch(`${RENDER_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove })
                });
                console.log("Tactical array synced safely with Neon Server.");
            } catch (error) {
                console.error("Cloud synchronization timeout.", error);
            }
        }

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-AI") gameMetrics.matchesPlayed = 0; 
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded font-sans shadow' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900 text-amber-400 rounded cursor-pointer transition font-sans border border-amber-900/40';
            
            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
                
                if(gameMetrics.matchesPlayed < 2) {
                    statusElement.innerText = "🎓 TRAINING MODE: Match " + (gameMetrics.matchesPlayed + 1) + "/2. System profiling active.";
                } else {
                    statusElement.innerText = "🔥 REAL COMBAT: MiniMax 3-Step Predictive Engine active. AI connected to Neon Cloud DB!";
                }
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
                statusElement.innerText = "Player 1 Turn! Ready for move...";
            }
            createBoard();
        }

        function generateAITeachingReport(userWon) {
            if (currentMode !== 'Vs-AI') return "Match over in Local Pass & Play.";
            gameMetrics.matchesPlayed++;
            
            if (userWon) {
                if(gameMetrics.matchMoveHistory.length > 0) {
                    const lastWinningMove = gameMetrics.matchMoveHistory[gameMetrics.matchMoveHistory.length - 1];
                    aiDatabase.userWinningTraps.push(lastWinningMove);
                    syncTrapToNeonDatabase(lastWinningMove); 
                }
                return "🎯 GENIUS WIN! You bypassed my Look-Ahead deep loops. Winning strategy synced with Render server.";
            }

            let advise = "🏛️ [AI MILITARY COACH ANALYSIS]:\n";
            if (gameMetrics.userAggressionCount < 3) {
                advise += "Your vanguard was stagnant. In Chaturanga, passive grid placement guarantees checkmate. Advance Ashva and Padati files.";
            } else if (gameMetrics.userMistakes.includes("Raja_exposed")) {
                advise += "TACTICAL BLUNDER: Left your Raja unguarded during your mid-board push. Keep your Mantri nearby as a personal shield.";
            } else {
                advise += "You underutilized your Ratha and Gaja units. Open active files for them to dominate the grid lanes.";
            }
            return advise;
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateAITeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="bg-stone-900 p-2.5 rounded text-left text-amber-400 border border-amber-900/40 text-[11px] leading-relaxed font-sans whitespace-pre-line">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
            
            gameMetrics.userMistakes = [];
            gameMetrics.userAggressionCount = 0;
        }
                    function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];

            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2; 
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative overflow-hidden';
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');

                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        square.classList.add(initialSetup[squareId] ? 'possible-capture-marker' : 'possible-move-marker');
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-900' : 'text-red-900';
                        square.innerHTML = `
                            <span class="text-xl md:text-2xl z-10 filter drop-shadow-sm">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-bold z-10 uppercase font-sans tracking-tighter leading-none mt-0.5">${piece.name}</span>
                        `;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        async function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;

                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                
                if (!isLegal) {
                    statusElement.innerText = `🏛️ System: Invalid Move. Obey the grid boundaries!`;
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) gameMetrics.userAggressionCount++;
                if (selectedSquare.piece.name === 'Raja' && row < 6) {
                    gameMetrics.userMistakes.push("Raja_exposed");
                }

                gameMetrics.matchMoveHistory.push({ from: fromKey, to: squareId, piece: selectedSquare.piece.name });

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("DEFEAT", "Computer AI captured your Raja! Kingdom collapsed.", "💀", false);
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("VICTORY!", "Magnificent! You captured the AI's throne Raja!", "👑", true);
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;

                if (currentMode === 'Vs-AI') {
                    statusElement.innerText = `🤖 AI calculating deep tactical futures...`;
                    setTimeout(triggerAiEngineLogic, 300); 
                } else {
                    isPlayer1Turn = !isPlayer1Turn;
                    statusElement.innerText = isPlayer1Turn ? "Player 1 Turn!" : "Player 2 Turn!";
                }
            }
        }

        function evaluateBoardState() {
            const scores = { 'Raja': 10000, 'Mantri': 90, 'Ratha': 50, 'Gaja': 40, 'Ashva': 30, 'Padati': 10 };
            let totalVal = 0;
            for (const key in initialSetup) {
                const piece = initialSetup[key];
                const [r, c] = key.split('-').map(Number);
                let weight = scores[piece.name];
                
                if (piece.name === 'Padati') weight += piece.isWhite ? (7 - r) : r;
                
                if (piece.isWhite) {
                    totalVal -= weight; 
                } else {
                    totalVal += weight; 
                }
            }
            return totalVal;
        }

        function minimax(depth, isAiMaximizing) {
            if (depth === 0 || isGameOver) return evaluateBoardState();

            const aiMoves = [];
            for (const key in initialSetup) {
                const isWhitePiece = initialSetup[key].isWhite;
                if ((isAiMaximizing && !isWhitePiece) || (!isAiMaximizing && isWhitePiece)) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) {
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                aiMoves.push({ from: key, to: `${toR}-${toC}`, piece: piece });
                            }
                        }
                    }
                }
            }

            if (aiMoves.length === 0) return evaluateBoardState();

            if (isAiMaximizing) {
                let maxEval = -Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    
                    let evaluation = minimax(depth - 1, false);
                    maxEval = Math.max(maxEval, evaluation);
                    
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    
                    let evaluation = minimax(depth - 1, true);
                    minEval = Math.min(minEval, evaluation);
                    
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return minEval;
            }
        }

        function triggerAiEngineLogic() {
            if (isGameOver) return;
            const allLegalAiMoves = [];

            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("STALEMATE", "No deployments left. Draw!", "🏳️", false);
                return;
            }

            if (gameMetrics.matchesPlayed >= 2) {
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    
                    move.minimaxWeight = minimax(2, false); 
                    
                    aiDatabase.userWinningTraps.forEach(trap => {
                        if (trap.to === move.toKey) move.minimaxWeight += 200;
                    });

                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            } else {
                allLegalAiMoves.sort((a, b) => Math.random() - 0.5);
            }
            
            const bestMove = allLegalAiMoves[0]; 

            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("DEFEAT", "Computer AI captured your Raja!", "💀", false);
                    return;
                } else {
                    statusElement.innerText = `⚔️ AI captured your ${bestMove.targetPiece.name}!`;
                }
            } else {
                statusElement.innerText = `🤖 AI moved ${bestMove.piece.name} to ${bestMove.toKey}.`;
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };

            createBoard();
            if (!isGameOver) {
                setTimeout(() => {
                    statusElement.innerText = "Your Turn! Make a calculated move...";
                }, 800);
            }
        }

        loadGlobalAIDatabase();
        triggerReset();
    </script>
</body>
</html>
