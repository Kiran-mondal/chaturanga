<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaturanga - 3D Ultra Premium Imperial Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* রাজকীয় মেটালিক ও থ্রি-ডি অ্যানিমেশন */
        @keyframes dynamicGlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(10deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
        }

        @keyframes pieceFloat {
            0% { transform: translateZ(20px) translateY(0px); }
            50% { transform: translateZ(35px) translateY(-4px); filter: drop-shadow(0 15px 12px rgba(0,0,0,0.6)); }
            100% { transform: translateZ(20px) translateY(0px); }
        }

        body {
            background: radial-gradient(circle at center, #2e1605 0%, #0a0401 100%);
            background-image: 
                linear-gradient(rgba(24, 11, 3, 0.85), rgba(10, 4, 1, 0.97)),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop');
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: dynamicGlow 20s ease-in-out infinite;
            perspective: 1200px; /* থ্রি-ডি গভীরতা */
        }

        /* ৩ডি থিমযুক্ত অষ্টপদ বোর্ড কন্টেইনার */
        .board-wrapper {
            transform-style: preserve-3d;
            transform: rotateX(22deg) rotateZ(0deg); /* বোর্ডকে সুন্দরভাবে ৩ডি অ্যাঙ্গেলে বাঁকানো */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .board-wrapper:hover {
            transform: rotateX(18deg) rotateZ(1deg); /* মাউস নিলে সামান্য থ্রি-ডি মুভমেন্ট */
        }

        /* প্রিমিয়াম মার্বেল ও চন্দন কাঠের ঘর */
        .ashtapada-square {
            background: linear-gradient(145deg, #f7e7c4, #dfcd9f);
            border: 1px solid #7c2d12;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .ashtapada-square:hover {
            background: linear-gradient(145deg, #fffbeb, #fef3c7) !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 50;
        }
        
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #7c2d12;
            opacity: 0.25;
            font-size: 2.5rem;
            font-weight: bold;
            transform: translateZ(1px);
        }
        
        /* গর্জিয়াস গোল্ডেন সিলেকশন */
        .selected { 
            background: linear-gradient(145deg, #fbbf24, #d97706) !important; 
            box-shadow: 0 0 25px #f59e0b, inset 0 0 15px #7c2d12;
            border-color: #fbbf24;
        }

        /* থ্রি-ডি ঘুঁটি ইফেক্ট */
        .premium-piece {
            transform: translateZ(20px);
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .selected .premium-piece {
            animation: pieceFloat 1.8s ease-in-out infinite;
        }
        
        /* মুভ এবং ক্যাপচার লাইটিং */
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 15px 5px #10b981;
            transform: translateZ(5px);
        }
        
        .possible-capture-marker {
            background: linear-gradient(145deg, #fca5a5, #ef4444) !important;
            box-shadow: 0 0 25px #ef4444, inset 0 0 15px #7c2d12 !important;
        }

        .heritage-card {
            background: linear-gradient(135deg, #2e1405 0%, #170802 100%);
            border: 2px solid #b45309;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-4 relative font-serif">

    <div class="text-center my-4 select-none">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-400 to-yellow-600 tracking-widest drop-shadow-2xl">चतुरङ्ग IMPERIAL</h1>
        <p class="text-amber-500/80 text-xs mt-1 font-sans tracking-widest uppercase">3D Cinematic Path-Blocking Battlefield</p>
    </div>

    <div id="mode-panel" class="flex gap-4 mb-6 heritage-card p-2 rounded-xl w-[440px] max-w-full justify-center items-center border-amber-500/50">
        <button id="btn2P" onclick="switchMode('2-Player')" class="px-4 py-2.5 text-xs font-black bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition-all font-sans border border-amber-600/30 tracking-wider">
            👥 PASS & PLAY
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="px-4 py-2.5 text-xs font-black bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 rounded-lg cursor-pointer transition-all font-sans shadow-lg shadow-amber-600/30 tracking-wider">
            🤖 VS COMPUTER AI
        </button>
        <button onclick="triggerReset()" class="ml-2 px-3 py-2.5 text-xs font-bold bg-stone-950 text-red-400 rounded-lg border border-red-900/40 cursor-pointer hover:bg-red-950/30 transition-all font-sans tracking-wider">
            🔄 RESTART
        </button>
    </div>

    <div class="mb-6">
        <div id="board" class="board-wrapper grid grid-cols-8 gap-0 border-[6px] border-amber-900 rounded-xl max-w-full w-[430px] h-[430px] bg-stone-950"></div>
    </div>

    <div class="heritage-card p-4 rounded-xl w-[440px] max-w-full grid grid-cols-2 gap-4 border-amber-900/60">
        <div>
            <h4 class="text-red-400 font-black text-xs mb-1.5 font-sans tracking-wider uppercase">💀 AI Losses (Black)</h4>
            <div id="black-graveyard" class="flex flex-wrap gap-1 text-2xl bg-stone-950/60 p-2 rounded-lg min-h-[44px] border border-stone-900 shadow-inner"></div>
        </div>
        <div>
            <h4 class="text-amber-400 font-black text-xs mb-1.5 font-sans tracking-wider uppercase">💀 Your Losses (White)</h4>
            <div id="white-graveyard" class="flex flex-wrap gap-1 text-2xl bg-stone-950/60 p-2 rounded-lg min-h-[44px] border border-stone-900 shadow-inner"></div>
        </div>
    </div>

    <div class="mt-4 heritage-card p-3 rounded-lg w-[440px] max-w-full border-amber-900/40">
        <h3 class="text-amber-400 font-bold mb-1 text-xs font-sans tracking-widest uppercase">⚡ Imperial Court Records</h3>
        <p id="status" class="text-amber-100/70 text-xs leading-relaxed font-sans">The 3D battlefield is set. Honor your ancestors.</p>
    </div>

    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-stone-950 border-2 border-amber-400 p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
            <div id="modalIcon" class="text-6xl mb-3 filter drop-shadow-md">🏆</div>
            <h2 id="modalTitle" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-500 tracking-wide uppercase">Victory!</h2>
            <p id="modalDesc" class="text-stone-400 text-sm my-5 leading-relaxed font-sans"></p>
            <button onclick="triggerReset()" class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-yellow-500 text-stone-950 font-black rounded-xl shadow-xl hover:from-amber-600 hover:to-yellow-600 transition-all text-sm tracking-widest uppercase font-sans cursor-pointer">
                🔄 Begin Next Campaign
            </button>
        </div>
    </div>
        <script>
        const pieceSigns = { "Raja": "👑", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "🛡️" };
        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isWhitesTurn = true; 

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isWhitesTurn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'px-4 py-2.5 text-xs font-black bg-amber-600 text-stone-950 rounded-lg cursor-pointer font-sans shadow-lg' : 'px-4 py-2.5 text-xs font-black bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition-all font-sans border border-amber-600/30';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'px-4 py-2.5 text-xs font-black bg-amber-600 text-stone-950 rounded-lg cursor-pointer font-sans shadow-lg' : 'px-4 py-2.5 text-xs font-black bg-stone-900 text-amber-400 rounded-lg cursor-pointer hover:bg-stone-800 transition-all font-sans border border-amber-600/30';
            
            statusElement.innerText = currentMode === 'Vs-AI' ? "Premium 3D Imperial Interface Initialized. VS AI Engine Online." : "Premium 3D Imperial Interface Initialized. Pass & Play Mode Active.";
            createBoard();
        }

        function showEndGameModal(title, description, icon) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = description;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];

            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) {
                        return !target; 
                    }
                    if (colDiff === 1 && toR === fromR + dir) {
                        return target && target.isWhite !== piece.isWhite;
                    }
                    return false;
                    
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                    
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2;
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span class="filter drop-shadow-md">${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span class="filter drop-shadow-md">${pieceSigns[p]}</span>`).join(' ');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative';
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');

                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        if (initialSetup[squareId]) {
                            square.classList.add('possible-capture-marker');
                        } else {
                            square.classList.add('possible-move-marker');
                        }
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-950 font-black' : 'text-red-950 font-black';
                        square.innerHTML = `
                            <div class="premium-piece flex flex-col items-center justify-center">
                                <span class="text-3xl z-10">${pieceSigns[piece.name]}</span>
                                <span class="text-[8px] ${labelColor} z-10 tracking-tighter leading-none mt-0.5 font-sans">${piece.name.toUpperCase()}</span>
                            </div>
                        `;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        async function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isWhitesTurn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;

                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                
                if (!isLegal) {
                    statusElement.innerText = `🏛️ Tactically Impossible! Choose a legal path.`;
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("Defeat", "The AI legions captured your Raja. Your kingdom falls.", "💀");
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("Imperial Victory", "Magnificent! You have conquered the AI Raja's throne!", "👑");
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;

                if (currentMode === 'Vs-AI') {
                    statusElement.innerText = `AI Imperial Engine is calculating countermeasures...`;
                    setTimeout(runAdvancedAiTurn, 350);
                } else {
                    isWhitesTurn = !isWhitesTurn;
                    statusElement.innerText = `Command shifted to ${isWhitesTurn ? 'White Armies' : 'Black Armies'}.`;
                }
            }
        }

        function runAdvancedAiTurn() {
            if (isGameOver) return;
            const allLegalAiMoves = [];

            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                let weight = 1;
                                if (target) {
                                    weight = target.name === 'Raja' ? 100 : (target.name === 'Mantri' ? 30 : 10);
                                }
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, weight: weight, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("Stalemate", "The battlefield is locked. No legal moves remaining. It's a DRAW!", "🏳️");
                return;
            }

            allLegalAiMoves.sort((a, b) => b.weight - a.weight);
            const bestMove = allLegalAiMoves[0]; 

            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("Defeat", "The AI legions captured your Raja. Your kingdom falls.", "💀");
                    return;
                } else {
                    statusElement.innerText = `⚔️ AI executed an offensive strike on your ${bestMove.targetPiece.name}!`;
                }
            } else {
                statusElement.innerText = `🤖 AI advanced its ${bestMove.piece.name} strategically to [Row ${bestMove.toKey[0]}, Col ${bestMove.toKey[2]}].`;
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };

            createBoard();
        }

        triggerReset();
    </script>
</body>
</html>
