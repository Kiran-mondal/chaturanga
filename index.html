<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="5GtTZlOTeLNQ70u775QHue-jroUvKrMAuYfzX1BdbUA" />
    <title>Chaturanga - चतुरङ्ग</title>
    
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0c0603;
            background-image: 
                linear-gradient(to bottom, rgba(12, 6, 3, 0.75) 0%, rgba(12, 6, 3, 0.92) 100%),
                url("https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1000&auto=format&fit=crop");
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-y: auto;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            animation: bgShift 15s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% {
                background-position: center top;
            }
            50% {
                background-position: center 2%;
            }
        }

        .heritage-card {
            background: rgba(26, 15, 8, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 83, 9, 0.35);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.85);
            animation: cardFadeIn 0.6s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ashtapada-board {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            border: 5px solid #d97706;
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.25), 0 20px 50px rgba(0, 0, 0, 0.95);
            border-radius: 8px;
            background-color: #5c2c16;
            animation: boardSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes boardSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .ashtapada-square {
            background-color: #ebd1af;
            border: 1px solid #7c2d12;
            transition: background-color 0.15s ease, transform 0.2s ease;
        }

        .ashtapada-square:hover {
            transform: translateY(-2px);
        }

        .ashtapada-square:nth-child(2n) {
            background-color: #d1ab7e;
        }

        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #7c2d12;
            opacity: 0.25;
            font-size: 1.8rem;
            font-weight: 300;
            animation: markerPulse 2s ease-in-out infinite;
        }

        @keyframes markerPulse {
            0%, 100% {
                opacity: 0.15;
                transform: scale(1);
            }
            50% {
                opacity: 0.35;
                transform: scale(1.1);
            }
        }

        .selected {
            background-color: #eab308 !important;
            box-shadow: inset 0 0 12px #7c2d12;
            animation: selectedPulse 0.6s ease-in-out;
        }

        @keyframes selectedPulse {
            0% {
                box-shadow: inset 0 0 12px #7c2d12, 0 0 0 0 rgba(234, 179, 8, 0.7);
            }
            50% {
                box-shadow: inset 0 0 12px #7c2d12, 0 0 0 8px rgba(234, 179, 8, 0);
            }
            100% {
                box-shadow: inset 0 0 12px #7c2d12, 0 0 0 0 rgba(234, 179, 8, 0);
            }
        }

        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 13px;
            height: 13px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            z-index: 10;
            animation: moveMarkerBounce 1.2s ease-in-out infinite;
        }

        @keyframes moveMarkerBounce {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 10px #10b981;
            }
            50% {
                transform: scale(1.3);
                box-shadow: 0 0 20px #10b981;
            }
        }

        .possible-capture-marker {
            background-color: #fca5a5 !important;
            box-shadow: inset 0 0 10px #dc2626 !important;
            animation: captureWarning 0.6s ease-in-out;
        }

        @keyframes captureWarning {
            0%, 100% {
                box-shadow: inset 0 0 10px #dc2626, 0 0 0 0 rgba(220, 38, 38, 0.5);
            }
            50% {
                box-shadow: inset 0 0 10px #dc2626, 0 0 0 10px rgba(220, 38, 38, 0);
            }
        }

        .losses-container {
            max-height: 80px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(180, 83, 9, 0.4) transparent;
            animation: containerSlideIn 0.7s ease-out;
        }

        @keyframes containerSlideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .losses-container::-webkit-scrollbar {
            width: 4px;
        }

        .losses-container::-webkit-scrollbar-thumb {
            background-color: rgba(180, 83, 9, 0.4);
            border-radius: 4px;
        }

        .branding-title {
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(217, 119, 6, 0.3), 0 0 20px rgba(234, 179, 8, 0.1);
            }
            50% {
                text-shadow: 0 0 20px rgba(217, 119, 6, 0.6), 0 0 30px rgba(234, 179, 8, 0.3);
            }
        }

        .status-indicator {
            animation: indicatorPulse 2s ease-in-out infinite;
        }

        @keyframes indicatorPulse {
            0%, 100% {
                box-shadow: 0 0 4px #10b981;
            }
            50% {
                box-shadow: 0 0 12px #10b981;
            }
        }

        .piece-icon {
            animation: pieceIdle 2s ease-in-out infinite;
        }

        @keyframes pieceIdle {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        .mode-button {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mode-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        .mode-button:active {
            transform: translateY(0);
        }

        #gameOverModal {
            animation: modalFadeIn 0.4s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            animation: modalContentBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalContentBounce {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .graveyard-piece {
            animation: graveyardFade 0.4s ease-out;
        }

        @keyframes graveyardFade {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Smooth scroll for the entire page */
        * {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="text-amber-100 min-h-screen flex flex-col items-center p-3 font-serif">

    <div class="w-full max-w-[400px] flex flex-col gap-3 pt-8 mb-0">
        
        <!-- Royal Sanskrit Branding (No Crown Logo) -->
        <div class="text-center py-4 select-none flex flex-col items-center gap-1">
            <h1 class="text-4xl font-serif text-amber-500 tracking-widest font-bold mb-1 branding-title">चतुरङ्ग</h1>
            <h2 class="text-3xl font-serif text-amber-500 tracking-widest font-extrabold uppercase mb-1 branding-title">(CHATURANGA)</h2>
            <h3 class="text-[10px] font-sans text-amber-600/90 font-bold tracking-widest uppercase">ROYAL SANDALWOOD ASHTAPADA ENGINE</h3>
        </div>

        <!-- Live Website Status Bar -->
        <div class="heritage-card rounded-lg px-4 py-2.5 flex justify-between items-center text-xs border border-amber-600/20">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse status-indicator"></span>
                <span class="font-sans font-extrabold tracking-wider text-stone-200">LIVE WEBSITE STATUS</span>
            </div>
            <div class="flex gap-4 font-sans text-right">
                <div>
                    <div class="text-amber-500 font-bold text-xs">1</div>
                    <div class="text-[8px] text-stone-400 font-bold tracking-tighter uppercase">ONLINE NOW</div>
                </div>
                <div>
                    <div class="text-amber-500 font-bold text-xs">0</div>
                    <div class="text-[8px] text-stone-400 font-bold tracking-tighter uppercase">IN BATTLES</div>
                </div>
            </div>
        </div>

        <!-- Mode Buttons -->
        <div id="mode-panel" class="flex gap-2 heritage-card p-1.5 rounded-lg justify-between items-center">
            <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold bg-stone-900/60 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button">
                👥 Pass & Play
            </button>
            <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button">
                💻 VS Computer
            </button>
            <button id="btnReset" onclick="triggerReset()" class="px-4 py-2 text-[11px] font-bold bg-stone-950/80 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button">
                🔄 Reset
            </button>
        </div>

        <!-- Game Board Container -->
        <div class="flex justify-center w-full">
            <div id="board" class="ashtapada-board grid grid-cols-8 gap-0"></div>
        </div>

        <!-- Graveyard Panel -->
        <div class="heritage-card p-3 rounded-lg grid grid-cols-2 gap-3 mb-2">
            <div>
                <h4 id="loss-title-1" class="text-amber-500/90 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 WHITE LOSSES</h4>
                <div id="white-graveyard" class="losses-container flex flex-wrap gap-1 text-base bg-black/30 p-1.5 rounded min-h-[40px]"></div>
            </div>
            <div>
                <h4 id="loss-title-2" class="text-red-500/90 font-bold text-[10px] mb-1 font-sans uppercase tracking-wider">💀 BLACK LOSSES</h4>
                <div id="black-graveyard" class="losses-container flex flex-wrap gap-1 text-base bg-black/30 p-1.5 rounded min-h-[40px]"></div>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-stone-950/95 border border-amber-500/50 p-6 rounded-xl max-w-xs w-full text-center shadow-2xl modal-content">
            <div id="modalIcon" class="text-4xl mb-2 piece-icon">👑</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 tracking-wide uppercase">Battle Settled</h2>
            <p id="modalDesc" class="text-stone-300 text-xs my-3 font-sans leading-relaxed"></p>
            <button onclick="triggerReset()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-stone-950 font-bold rounded-lg shadow-lg hover:from-amber-600 hover:to-amber-700 transition transform hover:scale-105">
                🔄 Restart Battle
            </button>
        </div>
    </div>
        <script>
        const VERCEL_API_URL = "https://chaturanga.quarry.dpdns.org/api";

        const pieceSigns = {
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️"
        };

        let gameMetrics = {
            currentStage: 1,
            userAggressionCount: 0,
            userMistakes: [],
            matchMoveHistory: [],
            consecutiveUserLosses: 0,
            adaptiveDifficultyScore: 50
        };

        let aiDatabase = {
            userWinningTraps: []
        };

        let currentMode = "Vs-AI";
        let isGameOver = false;
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true;

        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${VERCEL_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                }
            } catch (error) {
                console.log("Offline fallback active.");
            }
        }

        async function syncTrapToVercelDatabase(winningMove) {
            try {
                await fetch(`${VERCEL_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove })
                });
            } catch (error) {
                console.log("Local database bypass.");
            }
        }

        function resetInitialSetup() {
            initialSetup = {
                // --- BLACK PIECES (Row 0 and 1) ---
                "0-0": { name: "Ratha", isWhite: false }, 
                "0-1": { name: "Ashva", isWhite: false }, 
                "0-2": { name: "Gaja", isWhite: false },
                "0-3": { name: "Mantri", isWhite: false },   
                "0-4": { name: "Raja", isWhite: false },     
                "0-5": { name: "Gaja", isWhite: false }, 
                "0-6": { name: "Ashva", isWhite: false },
                "0-7": { name: "Ratha", isWhite: false },
                
                "1-0": { name: "Padati", isWhite: false }, 
                "1-1": { name: "Padati", isWhite: false }, 
                "1-2": { name: "Padati", isWhite: false },
                "1-3": { name: "Padati", isWhite: false }, 
                "1-4": { name: "Padati", isWhite: false }, 
                "1-5": { name: "Padati", isWhite: false },
                "1-6": { name: "Padati", isWhite: false },
                "1-7": { name: "Padati", isWhite: false },

                // --- WHITE PIECES (Row 6 and 7) ---
                "6-0": { name: "Padati", isWhite: true }, 
                "6-1": { name: "Padati", isWhite: true }, 
                "6-2": { name: "Padati", isWhite: true },
                "6-3": { name: "Padati", isWhite: true }, 
                "6-4": { name: "Padati", isWhite: true }, 
                "6-5": { name: "Padati", isWhite: true },
                "6-6": { name: "Padati", isWhite: true }, 
                "6-7": { name: "Padati", isWhite: true },
                
                "7-0": { name: "Ratha", isWhite: true }, 
                "7-1": { name: "Ashva", isWhite: true }, 
                "7-2": { name: "Gaja", isWhite: true },
                "7-3": { name: "Mantri", isWhite: true },   
                "7-4": { name: "Raja", isWhite: true },     
                "7-5": { name: "Gaja", isWhite: true }, 
                "7-6": { name: "Ashva", isWhite: true }, 
                "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if (mode === "Vs-AI") {
                gameMetrics.currentStage = 1;
                gameMetrics.consecutiveUserLosses = 0;
                gameMetrics.adaptiveDifficultyScore = 50;
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');

            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold bg-amber-600 text-stone-950 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button' : 'flex-1 py-2 text-[11px] font-bold bg-stone-900/60 rounded cursor-pointer transition uppercase tracking-wider flex items-center justify-center gap-1 mode-button';

            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 YOUR LOSSES";
                document.getElementById('loss-title-2').innerText = "🤖 COMPUTER LOSSES";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 PLAYER 1 LOSSES";
                document.getElementById('loss-title-2').innerText = "💀 PLAYER 2 LOSSES";
            }
            createBoard();
        }
                    function generateAITeachingReport(userWon) {
            if (currentMode !== 'Vs-AI') return "Match finished locally.";
            if (userWon) {
                gameMetrics.consecutiveUserLosses = 0;
                gameMetrics.currentStage = Math.min(gameMetrics.currentStage + 1, 3);
                gameMetrics.adaptiveDifficultyScore = Math.min(gameMetrics.adaptiveDifficultyScore + 25, 100);

                if (gameMetrics.matchMoveHistory.length > 0) {
                    const lastWinningMove = gameMetrics.matchMoveHistory[gameMetrics.matchMoveHistory.length - 1];
                    aiDatabase.userWinningTraps.push(lastWinningMove);
                    syncTrapToVercelDatabase(lastWinningMove.to);
                }
                return "🎉 Victory! The system has analyzed your tactics and will adapt for the next encounter.";
            }

            gameMetrics.consecutiveUserLosses++;
            let advise = "📋 [Engine Evaluation]:\n";
            if (gameMetrics.consecutiveUserLosses >= 2) {
                gameMetrics.currentStage = Math.max(gameMetrics.currentStage - 1, 1);
                gameMetrics.adaptiveDifficultyScore = Math.max(gameMetrics.adaptiveDifficultyScore - 20, 50);
                gameMetrics.consecutiveUserLosses = 0;
                advise += "🛡️ Engine difficulty dynamically scaled down for balance.\n";
            } else {
                advise += "⚡ Engine playing at tactical level. ";
                if (gameMetrics.userAggressionCount < 3) {
                    advise += "Develop Padati and Ashva pieces in the early phase.";
                } else if (gameMetrics.userMistakes.includes("Raja_exposed")) {
                    advise += "Tactical Error: Raja was left vulnerable with open lines of attack.";
                } else {
                    advise += "Coordinate your Ratha and Gaja forces to establish board dominance.";
                }
            }
            return advise;
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateAITeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="text-[11px] bg-amber-500/10 p-2 rounded text-amber-400 border border-amber-500/20">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
            gameMetrics.userMistakes = [];
            gameMetrics.userAggressionCount = 0;
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];
            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati':
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target;
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha':
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false;
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva':
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja':
                    return rowDiff === 2 && colDiff === 2;
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span class="inline-block p-1 bg-stone-950/70 rounded border border-amber-500/10 graveyard-piece">${pieceSigns[p]}</span>`).join('');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span class="inline-block p-1 bg-stone-950/70 rounded border border-amber-500/10 graveyard-piece">${pieceSigns[p]}</span>`).join('');
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none relative aspect-square';
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');
                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        square.classList.add(initialSetup[squareId] ? 'possible-capture-marker' : 'possible-move-marker');
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-700' : 'text-red-700';
                        square.innerHTML = `
                            <span class="text-2xl md:text-3xl filter drop-shadow-sm piece-icon">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-sans font-extrabold z-10 uppercase tracking-tighter absolute bottom-0.5">${piece.name}</span>
                        `;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        async function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;
                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                if (!isLegal) {
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) gameMetrics.userAggressionCount++;
                if (selectedSquare.piece.name === 'Raja' && row < 6) gameMetrics.userMistakes.push("Raja_exposed");

                gameMetrics.matchMoveHistory.push({ from: fromKey, to: squareId, piece: selectedSquare.piece.name });

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("DEFEAT", "The opponent has captured your Raja!", "💀", false);
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("VICTORY!", "You have conquered the opposing throne!", "👑", true);
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;
                if (currentMode === 'Vs-AI') {
                    setTimeout(triggerAiEngineLogic, 300); 
                } else {
                    isPlayer1Turn = !isPlayer1Turn;
                }
            }
        }

        function evaluateBoardState() {
            const scores = { 'Raja': 10000, 'Mantri': 90, 'Ratha': 50, 'Gaja': 40, 'Ashva': 30, 'Padati': 10 };
            let totalVal = 0;
            for (const key in initialSetup) {
                const piece = initialSetup[key];
                const [r, c] = key.split('-').map(Number);
                let weight = scores[piece.name];
                if (piece.name === 'Padati') weight += piece.isWhite ? (7 - r) : r;
                if (piece.isWhite) totalVal -= weight; else totalVal += weight;
            }
            return totalVal;
        }

        function minimax(depth, isAiMaximizing) {
            if (depth === 0 || isGameOver) return evaluateBoardState();
            const aiMoves = [];
            for (const key in initialSetup) {
                const isWhitePiece = initialSetup[key].isWhite;
                if ((isAiMaximizing && !isWhitePiece) || (!isAiMaximizing && isWhitePiece)) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) {
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                aiMoves.push({ from: key, to: `${toR}-${toC}`, piece: piece });
                            }
                        }
                    }
                }
            }
            if (aiMoves.length === 0) return evaluateBoardState();

            if (isAiMaximizing) {
                let maxEval = -Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, false);
                    maxEval = Math.max(maxEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, true);
                    minEval = Math.min(minEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return minEval;
            }
        }

        function triggerAiEngineLogic() {
            if (isGameOver) return;
            const allLegalAiMoves = [];
            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("STALEMATE", "The battle ended in a draw.", "🏳️", false);
                return;
            }

            if (gameMetrics.currentStage === 1) {
                allLegalAiMoves.sort((a, b) => Math.random() - 0.5);
            } else if (gameMetrics.currentStage === 2) {
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = evaluateBoardState(); 
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            } else {
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = minimax(2, false); 
                    
                    aiDatabase.userWinningTraps.forEach(trap => {
                        if (trap.to === move.toKey) move.minimaxWeight += 250;
                    });
                    
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            }
            
            const bestMove = allLegalAiMoves[0]; 
            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("DEFEAT", "The computer has captured your Raja!", "💀", false);
                    return;
                }
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };
            createBoard();
        }

        loadGlobalAIDatabase();
        triggerReset();
    </script>
