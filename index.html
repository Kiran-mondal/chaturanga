<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaturanga - Database Self-Learning Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .ashtapada-square {
            background-color: #fef3c7; 
            border: 1px solid #d97706; 
        }
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: rgba(217, 119, 6, 0.25);
            font-size: 2rem;
            font-weight: 300;
        }
        .selected { background-color: #fcd34d !important; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen flex flex-col items-center p-4">

    <div class="text-center my-2">
        <h1 class="text-4xl font-extrabold text-amber-500 tracking-wide">CHATURANGA</h1>
        <p class="text-stone-400 text-xs mt-1">Neon DB Full-Stack Adaptive AI Engine</p>
    </div>

    <div id="board" class="grid grid-cols-8 gap-0 border-4 border-amber-800 rounded-lg shadow-2xl max-w-full w-[430px] h-[430px] relative"></div>

    <div class="mt-4 bg-stone-800 p-3 rounded-lg border border-stone-700 w-[430px] max-w-full">
        <h3 class="text-amber-400 font-bold mb-1 text-xs">⚡ Database AI Learning Network</h3>
        <p id="status" class="text-stone-300 text-xs leading-relaxed">System Live. All moves are saved securely into your database repository.</p>
    </div>

    <script>
        const pieceSigns = { "Raja": "👑", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "🛡️" };
        
        // Setup positions
        let initialSetup = {
            "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
            "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
            "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
            "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

            "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
            "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
            "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
            "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
        };

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let selectedSquare = null;

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative';
                    
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-950' : 'text-red-800';
                        square.innerHTML = `<span class="text-xl z-10">${pieceSigns[piece.name]}</span><span class="text-[8px] ${labelColor} font-bold z-10 leading-none">${piece.name}</span>`;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
        }

        async function handleSquareClick(row, col) {
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece && targetPiece.isWhite) {
                    selectedSquare = { row, col, piece: targetPiece };
                    statusElement.innerText = `Staged ${targetPiece.name} at [${row}, ${col}].`;
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                
                // 📡 ASYNC DATABASE SYNC: প্লেয়ারের চালের ডেটা ডাটাবেজে পাঠানো হচ্ছে
                try {
                    const response = await fetch('/api/ai/learn', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ piece: selectedSquare.piece.name, coordinate: squareId })
                    });
                    const resData = await response.json();
                    console.log(`Tactic saved! Total database brain cells: ${resData.totalLearnedMoves}`);
                } catch (e) {
                    console.error("Database cloud logging delayed:", e);
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && row === 0) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: true };
                
                statusElement.innerText = `You played ${selectedSquare.piece.name}. Synced to Neon DB. AI calculating...`;
                selectedSquare = null;
                createBoard();

                setTimeout(runAdvancedAiTurn, 800);
            }
        }

        async function runAdvancedAiTurn() {
            const aiUnits = [];
            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [r, c] = key.split('-').map(Number);
                    aiUnits.push({ row: r, col: c, name: initialSetup[key].name });
                }
            }

            if (aiUnits.length === 0) {
                statusElement.innerText = "👑 Victory! You captured the enemy forces!";
                return;
            }

            // 🤖 DATABASE LOOKUP: এআই ডাটাবেজ থেকে পুরোনো মেমোরি চেক করার চেষ্টা করছে
            let prefersFlank = false;
            try {
                const memResponse = await fetch('/api/ai/memory');
                const memData = await memResponse.json();
                if(memData.success && memData.tactics.length > 5) {
                    // যদি ডাটাবেজ বলে মানুষ বেশি সাইড দিয়ে আক্রমণ করছে, এআই ডিফেন্স মোডে যাবে
                    prefersFlank = memData.tactics.some(t => t.target_coordinate.endsWith('-0') || t.target_coordinate.endsWith('-7'));
                }
            } catch(e){}

            let tacticalUnit = aiUnits[Math.floor(Math.random() * aiUnits.length)];
            
            if (prefersFlank && aiUnits.some(u => u.col === 0 || u.col === 7)) {
                const flankUnits = aiUnits.filter(u => u.col === 0 || u.col === 7);
                tacticalUnit = flankUnits[Math.floor(Math.random() * flankUnits.length)];
            }

            const currentAiKey = `${tacticalUnit.row}-${tacticalUnit.col}`;
            let nextRow = Math.min(tacticalUnit.row + 1, 7);
            let nextCol = tacticalUnit.col;

            if (tacticalUnit.name === 'Gaja' || tacticalUnit.name === 'Ashva') {
                nextRow = Math.min(tacticalUnit.row + 2, 7);
                nextCol = (tacticalUnit.col + 2 <= 7) ? tacticalUnit.col + 2 : Math.max(tacticalUnit.col - 2, 0);
            }

            let aiPieceName = tacticalUnit.name;
            if (aiPieceName === 'Padati' && nextRow === 7) aiPieceName = 'Mantri';

            delete initialSetup[currentAiKey];
            initialSetup[`${nextRow}-${nextCol}`] = { name: aiPieceName, isWhite: false };

            statusElement.innerText = `🤖 AI read database memory logs and advanced ${tacticalUnit.name} to [${nextRow}, ${nextCol}].`;
            createBoard();
        }

        // গেম লোড হওয়ার সময় ব্যাকএন্ডের স্টার্ট রুটকে কল করা
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/match/start', { method: 'POST' });
            createBoard();
        });
    </script>
</body>
</html>
